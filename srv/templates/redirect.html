<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirecting…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f1923;
    color: #e0e6ed;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .card {
    text-align: center;
    background: #1a2634;
    border: 1px solid #2a3a4a;
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 480px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .globe { font-size: 56px; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  p { color: #8899aa; margin-bottom: 24px; font-size: 15px; }
  .countdown {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid #3b82f6;
    font-size: 32px;
    font-weight: 700;
    color: #3b82f6;
    margin-bottom: 24px;
    position: relative;
  }
  .countdown svg {
    position: absolute;
    top: -3px; left: -3px;
    width: 72px; height: 72px;
    transform: rotate(-90deg);
  }
  .countdown svg circle {
    fill: none;
    stroke: #3b82f6;
    stroke-width: 3;
    stroke-dasharray: 207;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
  }
  a {
    display: inline-block;
    background: #3b82f6;
    color: #fff;
    text-decoration: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.2s;
  }
  a:hover { background: #2563eb; }
</style>
</head>
<body>
<div class="card">
  <div class="globe">🌍</div>
  <h1>Redirecting you…</h1>
  <p>You'll be sent to the full site in</p>
  <div class="countdown" id="cd">
    <svg viewBox="0 0 72 72"><circle id="ring" cx="36" cy="36" r="33"/></svg>
    <span id="num">10</span>
  </div>
  <br>
  <a id="link" href="{{.Target}}">Go now →</a>
</div>
<script>
(function() {
  var target = {{.TargetJS}};
  var seconds = 10;
  var num = document.getElementById('num');
  var ring = document.getElementById('ring');
  var total = 207; // 2 * PI * 33
  ring.style.strokeDashoffset = '0';
  var iv = setInterval(function() {
    seconds--;
    num.textContent = seconds;
    ring.style.strokeDashoffset = ((10 - seconds) / 10 * total).toFixed(1);
    if (seconds <= 0) {
      clearInterval(iv);
      window.location.href = target;
    }
  }, 1000);
})();
</script>
</body>
</html>
