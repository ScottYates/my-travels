<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Travels</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
:root {
  --sidebar-w: 420px;
  --navy: #1a1a2e;
  --navy-light: #232342;
  --navy-lighter: #2d2d52;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --orange: #f59e0b;
  --orange-light: #fbbf24;
  --green: #10b981;
  --red: #ef4444;
  --red-hover: #dc2626;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --card-bg: #16163a;
  --border: #334155;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --transition: 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--navy);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* Layout */
.app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100vh;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  z-index: 10;
  border-right: 1px solid var(--border);
  transition: transform 0.3s ease;
}

.map-container {
  flex: 1;
  position: relative;
  height: 100vh;
}

#map {
  width: 100%;
  height: 100%;
}

/* Mobile toggle */
.mobile-toggle {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: var(--navy);
  color: var(--text);
  border: 2px solid var(--accent);
  border-radius: 50px;
  padding: 12px 24px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow);
}

/* Header */
.sidebar-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.sidebar-header h1 {
  font-size: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-header h1 span { font-size: 22px; }

.header-actions {
  display: flex;
  gap: 8px;
}

/* Breadcrumb / back nav */
.nav-bar {
  display: none;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.nav-bar.active { display: flex; align-items: center; gap: 8px; }

.nav-bar .back-btn {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: background var(--transition);
}

.nav-bar .back-btn:hover { background: var(--navy-lighter); }

.nav-bar .breadcrumb {
  color: var(--text-muted);
  font-size: 13px;
}

/* Tab bar */
.tab-bar {
  display: none;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab-bar.active { display: flex; gap: 0; }

.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Scrollable content */
.sidebar-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--navy-lighter) transparent;
}

.sidebar-content::-webkit-scrollbar { width: 6px; }
.sidebar-content::-webkit-scrollbar-track { background: transparent; }
.sidebar-content::-webkit-scrollbar-thumb { background: var(--navy-lighter); border-radius: 3px; }

/* View panels */
.view-panel { display: none; padding: 20px 24px; }
.view-panel.active { display: block; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  white-space: nowrap;
}

.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); }

.btn-secondary { background: var(--navy-lighter); color: var(--text); }
.btn-secondary:hover { background: var(--border); }

.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { background: var(--red-hover); }

.btn-ghost {
  background: none;
  color: var(--text-muted);
  padding: 6px 10px;
}
.btn-ghost:hover { color: var(--text); background: var(--navy-lighter); }

.btn-orange { background: var(--orange); color: #1a1a2e; }
.btn-orange:hover { background: var(--orange-light); }

.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-full { width: 100%; }
.btn-icon { padding: 8px; font-size: 16px; }

/* Cards */
.trip-card {
  background: var(--navy-light);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}

.trip-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(59, 130, 246, 0.15);
}

.trip-card h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.trip-card p {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
}

.trip-card .trip-meta {
  display: flex;
  gap: 16px;
  margin-top: 12px;
  font-size: 12px;
  color: var(--text-dim);
}

.trip-card .trip-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.trip-card .delete-trip-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 4px;
  font-size: 14px;
  border-radius: 4px;
  opacity: 0;
  transition: all var(--transition);
}

.trip-card:hover .delete-trip-btn { opacity: 1; }
.trip-card .delete-trip-btn:hover { color: var(--red); background: rgba(239,68,68,0.1); }

/* Forms */
.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--navy-light);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  transition: border-color var(--transition);
  font-family: inherit;
}

.form-input:focus {
  outline: none;
  border-color: var(--accent);
}

textarea.form-input {
  resize: vertical;
  min-height: 80px;
}

/* Section headers in detail view */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  margin-top: 24px;
}

.section-header:first-child { margin-top: 0; }

.section-header h3 {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
}

/* Stops list */
.stop-item {
  display: flex;
  gap: 12px;
  padding: 14px;
  background: var(--navy-light);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all var(--transition);
  align-items: flex-start;
}

.stop-item:hover {
  border-color: var(--orange);
}

.stop-number {
  width: 28px;
  height: 28px;
  min-width: 28px;
  background: var(--orange);
  color: var(--navy);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
}

.stop-info { flex: 1; min-width: 0; }
.stop-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.stop-info p { font-size: 12px; color: var(--text-muted); }

.stop-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity var(--transition);
}

.stop-item:hover .stop-actions { opacity: 1; }

/* Routes list */
.route-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--navy-light);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}

.route-color {
  width: 24px;
  height: 4px;
  border-radius: 2px;
  min-width: 24px;
}

.route-info { flex: 1; }
.route-info h4 { font-size: 14px; font-weight: 600; }

/* Photo grid */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.photo-thumb {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  border: 2px solid transparent;
  transition: all var(--transition);
}

.photo-thumb:hover { border-color: var(--accent); transform: scale(1.02); }
.photo-thumb.focused { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.5); transform: scale(1.02); }

.photo-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo-thumb .photo-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(transparent 50%, rgba(0,0,0,0.6));
  opacity: 0;
  transition: opacity var(--transition);
  display: flex;
  align-items: flex-end;
  padding: 8px;
}

.photo-thumb:hover .photo-overlay { opacity: 1; }

.photo-thumb .photo-overlay span {
  font-size: 11px;
  color: white;
}

.photo-no-location {
  position: absolute;
  top: 4px;
  right: 4px;
  background: var(--orange);
  color: var(--navy);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
}

/* Drop zone */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 30px 20px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 16px;
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(59, 130, 246, 0.05);
}

.drop-zone .drop-icon { font-size: 32px; margin-bottom: 8px; }
.drop-zone p { font-size: 13px; color: var(--text-muted); }
.drop-zone .drop-hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Upload progress UI */
.upload-queue {
  margin-bottom: 16px;
}
.upload-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--card-bg);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  font-size: 13px;
  border: 1px solid var(--border);
}
.upload-item .upload-thumb {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
}
.upload-item .upload-info {
  flex: 1;
  min-width: 0;
}
.upload-item .upload-name {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  font-weight: 500;
}
.upload-item .upload-status {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.upload-item .upload-bar-bg {
  height: 4px;
  background: var(--navy-lighter);
  border-radius: 2px;
  margin-top: 4px;
  overflow: hidden;
}
.upload-item .upload-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.15s ease;
}
.upload-item .upload-bar.done { background: var(--green); }
.upload-item .upload-bar.error { background: var(--red); }
.upload-item .upload-pct {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
  width: 42px;
  text-align: right;
  flex-shrink: 0;
}
.upload-item .upload-check {
  color: var(--green);
  font-size: 16px;
  flex-shrink: 0;
  width: 42px;
  text-align: right;
}
.upload-item .upload-error-icon {
  color: var(--red);
  font-size: 16px;
  flex-shrink: 0;
  width: 42px;
  text-align: right;
}

/* Timeline view */
.timeline {
  position: relative;
  padding-left: 28px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 12px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--border);
}

.timeline-card {
  position: relative;
  background: var(--navy-light);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
  cursor: pointer;
  transition: all var(--transition);
}

.timeline-card:hover {
  border-color: var(--orange);
  transform: translateX(2px);
}

.timeline-card::before {
  content: '';
  position: absolute;
  left: -22px;
  top: 22px;
  width: 12px;
  height: 12px;
  background: var(--orange);
  border-radius: 50%;
  border: 2px solid var(--navy);
}

.timeline-card .tc-date {
  font-size: 11px;
  color: var(--orange);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.timeline-card h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.timeline-card .tc-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 12px;
}

.timeline-photos {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 4px;
}

.timeline-photos img {
  width: 80px;
  height: 60px;
  object-fit: cover;
  border-radius: 6px;
  flex-shrink: 0;
}

/* Share bar */
.share-bar {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.share-url-row {
  display: flex;
  gap: 8px;
}

.share-url-row input {
  flex: 1;
  padding: 8px 12px;
  background: var(--navy-light);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 12px;
  font-family: monospace;
}

/* Cesium overrides */
#map .cesium-viewer-bottom,
#map .cesium-viewer-animationContainer,
#map .cesium-viewer-timelineContainer,
#map .cesium-viewer-fullscreenContainer,
#map .cesium-viewer-toolbar,
#map .cesium-credit-logoContainer,
#map .cesium-credit-textContainer { display: none !important; }
#map .cesium-viewer { overflow: hidden; }
#map .cesium-widget canvas { border-radius: 0; }

/* Custom popup on globe */
.globe-popup {
  position: absolute;
  z-index: 50;
  background: var(--navy);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  min-width: 160px;
  max-width: 280px;
  pointer-events: auto;
  animation: popIn 0.2s ease;
}
@keyframes popIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
.globe-popup-close {
  position: absolute; top: 6px; right: 8px;
  background: none; border: none; color: white;
  font-size: 18px; cursor: pointer; z-index: 2;
}
.globe-popup-content { padding: 12px; color: var(--text); font-size: 13px; }
.globe-popup-content strong { font-size: 14px; }
.globe-popup-photo img {
  width: 100%; max-height: 200px; object-fit: cover;
  border-radius: var(--radius) var(--radius) 0 0; display: block;
}
.globe-popup-photo .popup-caption {
  padding: 10px 14px; font-size: 13px; color: var(--text);
}



/* Map toolbar */
.map-toolbar {
  position: absolute;
  top: 12px;
  right: 60px;
  z-index: 5;
  display: flex;
  gap: 8px;
}

.map-toolbar .btn {
  box-shadow: var(--shadow);
}

/* Drawing mode indicator */
.draw-indicator {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  background: var(--accent);
  color: white;
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: var(--shadow);
  display: none;
  gap: 8px;
  align-items: center;
}

.draw-indicator.active { display: flex; }

/* Geotag mode indicator */
.geotag-indicator {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  background: var(--green);
  color: white;
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: var(--shadow);
  display: none;
  gap: 8px;
  align-items: center;
}

.geotag-indicator.active { display: flex; }

/* Stop adding mode indicator */
.stop-indicator {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  background: var(--orange);
  color: var(--navy);
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 700;
  box-shadow: var(--shadow);
  display: none;
  gap: 8px;
  align-items: center;
}

.stop-indicator.active { display: flex; }

/* Edit stop modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--navy);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  width: 400px;
  max-width: 90vw;
  box-shadow: var(--shadow);
}

.modal h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
}

/* Photo detail modal */
.photo-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}

.photo-modal-overlay.active { display: flex; }

.photo-modal-overlay img {
  max-width: 90vw;
  max-height: 70vh;
  object-fit: contain;
  border-radius: var(--radius);
}

.photo-modal-info {
  background: var(--navy);
  border-radius: var(--radius);
  padding: 16px 24px;
  display: flex;
  gap: 12px;
  align-items: center;
}

.photo-modal-info input {
  background: var(--navy-light);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 6px 12px;
  font-size: 14px;
  width: 220px;
}

.photo-modal-info input:focus { outline: none; border-color: var(--accent); }

/* Read-only badge */
.readonly-badge {
  display: none;
  background: var(--navy-lighter);
  color: var(--text-muted);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
}

body.readonly .readonly-badge { display: inline-flex; }
body.readonly .edit-only { display: none !important; }

/* Empty states */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}

.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
}

.empty-state h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
}

.empty-state p {
  font-size: 13px;
  line-height: 1.5;
}

/* Loading spinner */
.spinner {
  width: 24px;
  height: 24px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 40px auto;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Toast notification */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 10000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--navy-light);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  min-width: 340px;
  max-width: 90vw;
  box-shadow: var(--shadow);
}
.modal-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text);
}
.modal-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--navy);
  color: var(--text);
  font-size: 15px;
  outline: none;
  margin-bottom: 16px;
}
.modal-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.modal-btn {
  padding: 8px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition);
}
.modal-btn.cancel { background: var(--navy-lighter); color: var(--text-muted); }
.modal-btn.cancel:hover { background: var(--border); }
.modal-btn.confirm { background: var(--accent); color: white; }
.modal-btn.confirm:hover { background: var(--accent-hover); }

.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--navy-light);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 18px;
  font-size: 13px;
  color: var(--text);
  box-shadow: var(--shadow);
  animation: toastIn 0.3s ease;
  max-width: 320px;
}

.toast.error { border-color: var(--red); }
.toast.success { border-color: var(--green); }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    min-width: 100%;
    height: 55vh;
    border-right: none;
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    transform: translateY(calc(100% - 60px));
    transition: transform 0.3s ease;
  }

  .sidebar.open {
    transform: translateY(0);
  }

  .sidebar::before {
    content: '';
    display: block;
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 6px;
    flex-shrink: 0;
  }

  .mobile-toggle { display: block; }

  .map-container { width: 100%; height: 100vh; }

  .map-toolbar { right: 12px; }

  .photo-grid { grid-template-columns: repeat(3, 1fr); }
}

/* Custom map markers */
.stop-marker {
  width: 32px;
  height: 32px;
  background: var(--orange);
  border: 3px solid white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--navy);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  transition: transform 0.15s ease;
}

.stop-marker:hover { transform: scale(1.15); }

.photo-marker {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 3px solid white;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  transition: transform 0.15s ease;
  background: var(--navy);
}

.photo-marker:hover { transform: scale(1.2); }

.photo-marker img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>
<body>

<script>
(function() {
"use strict";

// ---------------------------------------------------------------
// State
// ---------------------------------------------------------------
const state = {
  trips: [],
  currentTrip: null,
  currentView: 'list',    // list | detail | timeline
  currentTab: 'detail',   // detail | timeline
  readOnly: false,
  shareID: null,
  drawMode: false,
  drawPoints: [],
  geotagMode: false,
  geotagPhotoId: null,
  addStopMode: false,
  selectedPhotoId: null,
  focusedPhotoId: null,
  mapMarkers: [],
  photoMarkers: [],
};

// ---------------------------------------------------------------
// Detect share mode from URL
// ---------------------------------------------------------------
const pathParts = window.location.pathname.split('/');
if (pathParts[1] === 'share' && pathParts[2]) {
  state.readOnly = true;
  state.shareID = pathParts[2];
  document.body.classList.add('readonly');
}

// ---------------------------------------------------------------
// DOM refs
// ---------------------------------------------------------------
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const sidebar = $('#sidebar');
const navBar = $('#navBar');
const tabBar = $('#tabBar');
const tripsListView = $('#tripsListView');
const tripDetailView = $('#tripDetailView');
const timelineView = $('#timelineView');
const tripsList = $('#tripsList');
const tripDetailContent = $('#tripDetailContent');
const timelineContent = $('#timelineContent');
const shareBar = $('#shareBar');
const shareUrl = $('#shareUrl');
const toastContainer = $('#toastContainer');

// ---------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------
function customPrompt(title, defaultVal) {
  return new Promise((resolve) => {
    const overlay = $('#promptModal');
    const input = $('#promptInput');
    const okBtn = $('#promptOK');
    const cancelBtn = $('#promptCancel');
    $('#promptTitle').textContent = title;
    input.value = defaultVal || '';
    overlay.classList.add('active');
    input.focus();
    function cleanup() {
      overlay.classList.remove('active');
      okBtn.removeEventListener('click', onOK);
      cancelBtn.removeEventListener('click', onCancel);
      input.removeEventListener('keydown', onKey);
    }
    function onOK() { cleanup(); resolve(input.value); }
    function onCancel() { cleanup(); resolve(null); }
    function onKey(e) { if(e.key==='Enter') onOK(); if(e.key==='Escape') onCancel(); }
    okBtn.addEventListener('click', onOK);
    cancelBtn.addEventListener('click', onCancel);
    input.addEventListener('keydown', onKey);
  });
}

function toast(msg, type) {
  type = type || 'success';
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  toastContainer.appendChild(el);
  setTimeout(() => { el.remove(); }, 3000);
}

async function api(method, path, body) {
  const opts = { method: method, headers: {} };
  if (body && !(body instanceof FormData)) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  } else if (body instanceof FormData) {
    opts.body = body;
  }
  const res = await fetch(path, opts);
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data;
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ---------------------------------------------------------------
// Map setup (CesiumJS 3D Globe)
// ---------------------------------------------------------------
let viewer; window._map = null;
let popupEl = null; // current open popup

function initMap() {
  // Disable Cesium Ion completely (we use free tile providers)
  Cesium.Ion.defaultAccessToken = '';

  viewer = new Cesium.Viewer('map', {
    baseLayer: false,
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    animation: false,
    timeline: false,
    fullscreenButton: false,
    vrButton: false,
    selectionIndicator: false,
    infoBox: false,
    skyAtmosphere: new Cesium.SkyAtmosphere(),
    requestRenderMode: true,
    maximumRenderTimeChange: 0.5,
    contextOptions: {
      webgl: { alpha: false }
    }
  });

  // Reduce tile detail slightly for smoother transitions
  viewer.scene.globe.maximumScreenSpaceError = 4;

  // Add ESRI World Imagery (satellite) + labels overlay
  Cesium.ArcGisMapServerImageryProvider.fromUrl(
    'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
  ).then(function(provider) {
    viewer.imageryLayers.addImageryProvider(provider);
    // Add labels on top
    return Cesium.ArcGisMapServerImageryProvider.fromUrl(
      'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer'
    );
  }).then(function(labelsProvider) {
    viewer.imageryLayers.addImageryProvider(labelsProvider);
  }).catch(function() {
    // Fallback to OpenStreetMap if ESRI fails
    viewer.imageryLayers.addImageryProvider(
      new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org/' })
    );
  });

  // Enable nice globe rendering
  viewer.scene.globe.enableLighting = false;
  viewer.scene.globe.depthTestAgainstTerrain = false;

  window._map = viewer;

  // Set initial camera to a nice overview of the globe
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(10, 30, 20000000),
    orientation: {
      heading: Cesium.Math.toRadians(0),
      pitch: Cesium.Math.toRadians(-90),
      roll: 0,
    }
  });

  // Wait for terrain + imagery to be ready
  viewer.scene.globe.tileLoadProgressEvent.addEventListener(function onReady(remaining) {
    if (remaining === 0) {
      viewer.scene.globe.tileLoadProgressEvent.removeEventListener(onReady);
    }
  });

  // Click handler
  const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  handler.setInputAction(function(click) {
    onCesiumClick(click.position);
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
  handler.setInputAction(function(click) {
    onCesiumDoubleClick(click.position);
  }, Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK);

  // Load data
  if (state.shareID) {
    loadSharedTrip(state.shareID);
  } else {
    loadTrips();
  }
}

function screenToCartographic(screenPos) {
  const ray = viewer.camera.getPickRay(screenPos);
  if (!ray) return null;
  const cartesian = viewer.scene.globe.pick(ray, viewer.scene);
  if (!cartesian) return null;
  const carto = Cesium.Cartographic.fromCartesian(cartesian);
  return {
    lat: Cesium.Math.toDegrees(carto.latitude),
    lng: Cesium.Math.toDegrees(carto.longitude),
  };
}

function onCesiumClick(screenPos) {
  const pos = screenToCartographic(screenPos);
  if (!pos) return;

  if (state.drawMode) {
    state.drawPoints.push([pos.lng, pos.lat]);
    updateDrawPreview();
    return;
  }

  if (state.geotagMode && state.geotagPhotoId) {
    setPhotoLocation(state.geotagPhotoId, pos.lat, pos.lng);
    return;
  }

  if (state.addStopMode) {
    addStopAtLocation(pos.lat, pos.lng);
    return;
  }

  // Check if we clicked an entity (stop/photo)
  const picked = viewer.scene.pick(screenPos);
  if (Cesium.defined(picked) && picked.id) {
    const entity = picked.id;
    if (entity._stopData) {
      showGlobePopup(entity._stopData.lng, entity._stopData.lat,
        '<strong>' + escapeHtml(entity._stopData.title) + '</strong>' +
        (entity._stopData.description ? '<br><span style="font-size:12px;color:#94a3b8">' + escapeHtml(entity._stopData.description) + '</span>' : ''));
    } else if (entity._photoData) {
      const p = entity._photoData;
      showGlobePopup(p.lng, p.lat,
        '<div class="globe-popup-photo">' +
        '<img src="/uploads/' + escapeHtml(p.filename) + '" alt="">' +
        (p.caption ? '<div class="popup-caption">' + escapeHtml(p.caption) + '</div>' : '') +
        '</div>', true);
    }
  } else {
    closeGlobePopup();
    // Clear sidebar photo focus when clicking empty globe space
    if (state.focusedPhotoId) {
      state.focusedPhotoId = null;
      $$('.photo-thumb').forEach(t => t.classList.remove('focused'));
      // Reset marker sizes
      state.photoMarkers.forEach(m => {
        if (m.billboard) { m.billboard.width = 44; m.billboard.height = 44; }
        if (m.point) { m.point.pixelSize = 14; }
      });
      viewer.scene.requestRender();
    }
  }
}

function onCesiumDoubleClick(screenPos) {
  if (state.drawMode && state.drawPoints.length >= 2) {
    finishDrawing();
  }
}

function showGlobePopup(lng, lat, html, isPhoto) {
  closeGlobePopup();
  const div = document.createElement('div');
  div.className = 'globe-popup';
  div.innerHTML = '<button class="globe-popup-close">&times;</button>' +
    (isPhoto ? html : '<div class="globe-popup-content">' + html + '</div>');
  div.querySelector('.globe-popup-close').onclick = closeGlobePopup;
  div.style.display = 'none';
  document.getElementById('map').appendChild(div);
  popupEl = { el: div, lng, lat };

  // Position it immediately
  updatePopupPosition();
  div.style.display = 'block';

  // Keep it positioned as camera moves
  viewer.scene.preRender.addEventListener(updatePopupPosition);
}

function updatePopupPosition() {
  if (!popupEl) return;
  const cartesian = Cesium.Cartesian3.fromDegrees(popupEl.lng, popupEl.lat, 50);
  const screen = Cesium.SceneTransforms.worldToWindowCoordinates(viewer.scene, cartesian);
  if (!screen) { popupEl.el.style.display = 'none'; return; }
  popupEl.el.style.display = 'block';
  const mapRect = document.getElementById('map').getBoundingClientRect();
  popupEl.el.style.left = (screen.x - mapRect.left - popupEl.el.offsetWidth / 2) + 'px';
  popupEl.el.style.top = (screen.y - mapRect.top - popupEl.el.offsetHeight - 20) + 'px';
}

function closeGlobePopup() {
  if (popupEl) {
    viewer.scene.preRender.removeEventListener(updatePopupPosition);
    popupEl.el.remove();
    popupEl = null;
  }
}

// ---------------------------------------------------------------
// Navigation
// ---------------------------------------------------------------
function showView(view) {
  state.currentView = view;
  tripsListView.classList.remove('active');
  tripDetailView.classList.remove('active');
  timelineView.classList.remove('active');

  if (view === 'list') {
    tripsListView.classList.add('active');
    navBar.classList.remove('active');
    tabBar.classList.remove('active');
    shareBar.style.display = 'none';
    clearMapData();
  } else if (view === 'detail') {
    tripDetailView.classList.add('active');
    navBar.classList.add('active');
    tabBar.classList.add('active');
    state.currentTab = 'detail';
    updateTabs();
    if (state.currentTrip && !state.readOnly) {
      shareBar.style.display = 'block';
    }
  } else if (view === 'timeline') {
    timelineView.classList.add('active');
    navBar.classList.add('active');
    tabBar.classList.add('active');
    state.currentTab = 'timeline';
    updateTabs();
    if (state.currentTrip && !state.readOnly) {
      shareBar.style.display = 'block';
    }
  }
}

function updateTabs() {
  $$('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === state.currentTab);
  });
}

// Tab clicks
$$('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.currentTab = btn.dataset.tab;
    updateTabs();
    if (btn.dataset.tab === 'detail') {
      showView('detail');
    } else if (btn.dataset.tab === 'timeline') {
      showView('timeline');
      renderTimeline();
    }
  });
});

// Back button
$('#backBtn').addEventListener('click', () => {
  if (state.readOnly) return;
  state.currentTrip = null;
  showView('list');
  loadTrips();
});

// Mobile toggle
$('#mobileToggle').addEventListener('click', () => {
  sidebar.classList.toggle('open');
});

// ---------------------------------------------------------------
// Trips List
// ---------------------------------------------------------------
async function loadTrips() {
  try {
    tripsList.innerHTML = '<div class="spinner"></div>';
    state.trips = await api('GET', '/api/trips');
    renderTripsList();
  } catch (err) {
    tripsList.innerHTML = '<div class="empty-state"><p>Failed to load trips</p></div>';
    toast(err.message, 'error');
  }
}

function renderTripsList() {
  if (!state.trips || state.trips.length === 0) {
    tripsList.innerHTML = '<div class="empty-state"><div class="empty-icon">🗺️</div><h3>No trips yet</h3><p>Create your first trip to start mapping your adventures!</p></div>';
    return;
  }
  tripsList.innerHTML = state.trips.map(trip => {
    return '<div class="trip-card" data-id="' + escapeHtml(trip.id) + '">'
      + '<button class="delete-trip-btn edit-only" data-id="' + escapeHtml(trip.id) + '" title="Delete trip">🗑</button>'
      + '<h3>' + escapeHtml(trip.title) + '</h3>'
      + '<p>' + escapeHtml(trip.description || 'No description') + '</p>'
      + '<div class="trip-meta">'
      + '<span>📅 ' + formatDate(trip.created_at) + '</span>'
      + '</div>'
      + '</div>';
  }).join('');

  // Card click
  $$('.trip-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-trip-btn')) return;
      loadTrip(card.dataset.id);
    });
  });

  // Delete buttons
  $$('.delete-trip-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('Delete this trip? This cannot be undone.')) return;
      try {
        await api('DELETE', '/api/trips/' + btn.dataset.id);
        toast('Trip deleted');
        loadTrips();
      } catch (err) {
        toast(err.message, 'error');
      }
    });
  });
}

// ---------------------------------------------------------------
// Create trip
// ---------------------------------------------------------------
$('#newTripBtn').addEventListener('click', () => {
  $('#createTripModal').classList.add('active');
  $('#newTripTitle').value = '';
  $('#newTripDesc').value = '';
  $('#newTripTitle').focus();
});

$('#createTripCancel').addEventListener('click', () => {
  $('#createTripModal').classList.remove('active');
});

$('#createTripSave').addEventListener('click', async () => {
  const title = $('#newTripTitle').value.trim();
  const desc = $('#newTripDesc').value.trim();
  if (!title) { toast('Title is required', 'error'); return; }
  try {
    const trip = await api('POST', '/api/trips', { title: title, description: desc });
    $('#createTripModal').classList.remove('active');
    toast('Trip created!');
    loadTrip(trip.id);
  } catch (err) {
    toast(err.message, 'error');
  }
});

// Enter to submit
$('#newTripTitle').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); $('#createTripSave').click(); }
});

// ---------------------------------------------------------------
// Load single trip
// ---------------------------------------------------------------
async function loadTrip(id) {
  try {
    const trip = await api('GET', '/api/trips/' + id);
    state.currentTrip = trip;
    $('#breadcrumb').textContent = trip.title;
    shareUrl.value = window.location.origin + '/share/' + trip.share_id;
    showView('detail');
    renderTripDetail();
    renderMapData();
    if (sidebar.classList.contains('open')) {
      // keep open on mobile
    }
  } catch (err) {
    toast(err.message, 'error');
  }
}

async function loadSharedTrip(shareId) {
  try {
    const trip = await api('GET', '/api/share/' + shareId);
    state.currentTrip = trip;
    $('#breadcrumb').textContent = trip.title;
    navBar.classList.add('active');
    // hide back button in share mode
    $('#backBtn').style.display = 'none';
    showView('detail');
    renderTripDetail();
    renderMapData();
  } catch (err) {
    toast('Trip not found', 'error');
  }
}

async function reloadCurrentTrip() {
  if (!state.currentTrip) return;
  if (state.readOnly && state.shareID) {
    await loadSharedTrip(state.shareID);
  } else {
    await loadTrip(state.currentTrip.id);
  }
}

// ---------------------------------------------------------------
// Trip Detail Rendering
// ---------------------------------------------------------------
function renderTripDetail() {
  const trip = state.currentTrip;
  if (!trip) return;

  const stops = trip.stops || [];
  const photos = trip.photos || [];
  const routes = trip.routes || [];

  let html = '';

  // Trip info
  html += '<div style="margin-bottom:8px">';
  html += '<h2 style="font-size:20px;font-weight:700;margin-bottom:4px">' + escapeHtml(trip.title) + '</h2>';
  if (trip.description) {
    html += '<p style="font-size:13px;color:var(--text-muted);line-height:1.5">' + escapeHtml(trip.description) + '</p>';
  }
  html += '</div>';

  // ---- STOPS ----
  html += '<div class="section-header">';
  html += '<h3>📌 Stops (' + stops.length + ')</h3>';
  html += '<button class="btn btn-orange btn-sm edit-only" id="addStopBtn">+ Add Stop</button>';
  html += '</div>';

  if (stops.length === 0) {
    html += '<p style="font-size:13px;color:var(--text-dim);margin-bottom:8px">No stops yet. Click the map to add one!</p>';
  } else {
    stops.sort((a, b) => a.stop_order - b.stop_order);
    stops.forEach((stop, i) => {
      html += '<div class="stop-item" data-stop-id="' + escapeHtml(stop.id) + '">';
      html += '<div class="stop-number">' + (i + 1) + '</div>';
      html += '<div class="stop-info">';
      html += '<h4>' + escapeHtml(stop.title || 'Untitled Stop') + '</h4>';
      if (stop.description) html += '<p>' + escapeHtml(stop.description) + '</p>';
      if (stop.arrived_at) html += '<p style="color:var(--orange);margin-top:2px">' + formatDate(stop.arrived_at) + '</p>';
      html += '</div>';
      html += '<div class="stop-actions">';
      html += '<button class="btn btn-ghost btn-sm edit-only edit-stop-btn" data-stop-id="' + escapeHtml(stop.id) + '" title="Edit">✏️</button>';
      html += '<button class="btn btn-ghost btn-sm edit-only delete-stop-btn" data-stop-id="' + escapeHtml(stop.id) + '" title="Delete">🗑</button>';
      html += '</div>';
      html += '</div>';
    });
  }

  // ---- ROUTES ----
  html += '<div class="section-header">';
  html += '<h3>🛤 Routes (' + routes.length + ')</h3>';
  html += '<div class="edit-only" style="display:flex;gap:6px">';
  html += '<button class="btn btn-secondary btn-sm" id="importGpxBtn">📂 GPX</button>';
  html += '<button class="btn btn-primary btn-sm" id="drawRouteBtn">🖊 Draw</button>';
  html += '</div>';
  html += '</div>';

  if (routes.length === 0) {
    html += '<p style="font-size:13px;color:var(--text-dim);margin-bottom:8px">No routes yet. Import a GPX file or draw one!</p>';
  } else {
    routes.forEach(route => {
      html += '<div class="route-item">';
      html += '<div class="route-color" style="background:' + escapeHtml(route.color || '#3388ff') + '"></div>';
      html += '<div class="route-info"><h4>' + escapeHtml(route.name) + '</h4></div>';
      html += '<button class="btn btn-ghost btn-sm edit-only delete-route-btn" data-route-id="' + escapeHtml(route.id) + '" title="Delete">🗑</button>';
      html += '</div>';
    });
  }

  // ---- PHOTOS ----
  html += '<div class="section-header">';
  html += '<h3>📸 Photos (' + photos.length + ')</h3>';
  html += '</div>';

  // Drop zone
  html += '<div class="drop-zone edit-only" id="photoDropZone">';
  html += '<div class="drop-icon">📷</div>';
  html += '<p>Drop photos here or click to upload</p>';
  html += '<p class="drop-hint">JPG, PNG up to 32MB</p>';
  html += '<input type="file" id="photoFileInput" accept="image/*" multiple style="display:none">';
  html += '</div>';
  html += '<div class="upload-queue edit-only" id="uploadQueue"></div>';

  if (photos.length > 0) {
    html += '<div class="photo-grid">';
    photos.forEach(photo => {
      const hasLocation = photo.lat != null && photo.lng != null;
      html += '<div class="photo-thumb" data-photo-id="' + escapeHtml(photo.id) + '">';
      html += '<img src="/uploads/' + escapeHtml(photo.filename) + '" alt="' + escapeHtml(photo.caption || photo.original_name) + '" loading="lazy">';
      html += '<div class="photo-overlay"><span>' + escapeHtml(photo.caption || photo.original_name) + '</span></div>';
      if (!hasLocation) {
        html += '<span class="photo-no-location">No 📍</span>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  // Hidden GPX file input
  html += '<input type="file" id="gpxFileInput" accept=".gpx" style="display:none">';

  tripDetailContent.innerHTML = html;

  // --- Wire up events ---
  wireDetailEvents();
}

function wireDetailEvents() {
  const trip = state.currentTrip;
  if (!trip) return;

  // Add stop button
  const addStopBtn = $('#addStopBtn');
  if (addStopBtn) {
    addStopBtn.addEventListener('click', () => {
      state.addStopMode = true;
      $('#stopIndicator').classList.add('active');
      viewer.canvas.style.cursor = 'crosshair';
    });
  }

  // Cancel add stop
  $('#cancelStop').addEventListener('click', () => {
    state.addStopMode = false;
    $('#stopIndicator').classList.remove('active');
    viewer.canvas.style.cursor = '';
  });

  // Stop items — click to fly
  $$('.stop-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.edit-stop-btn') || e.target.closest('.delete-stop-btn')) return;
      const sid = el.dataset.stopId;
      const stop = (trip.stops || []).find(s => s.id === sid);
      if (stop) {
        viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(stop.lng, stop.lat, 8000), orientation: { heading: 0, pitch: Cesium.Math.toRadians(-45), roll: 0 }, duration: 1.5 });
      }
    });
  });

  // Edit stop buttons
  $$('.edit-stop-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openEditStop(btn.dataset.stopId);
    });
  });

  // Delete stop buttons
  $$('.delete-stop-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('Delete this stop?')) return;
      try {
        await api('DELETE', '/api/stops/' + btn.dataset.stopId);
        toast('Stop deleted');
        reloadCurrentTrip();
      } catch (err) {
        toast(err.message, 'error');
      }
    });
  });

  // Import GPX
  const importBtn = $('#importGpxBtn');
  const gpxInput = $('#gpxFileInput');
  if (importBtn && gpxInput) {
    importBtn.addEventListener('click', () => gpxInput.click());
    gpxInput.addEventListener('change', async () => {
      const file = gpxInput.files[0];
      if (!file) return;
      const fd = new FormData();
      fd.append('gpx', file);
      try {
        await api('POST', '/api/trips/' + trip.id + '/routes', fd);
        toast('GPX route imported!');
        reloadCurrentTrip();
      } catch (err) {
        toast(err.message, 'error');
      }
    });
  }

  // Draw route
  const drawBtn = $('#drawRouteBtn');
  if (drawBtn) {
    drawBtn.addEventListener('click', startDrawing);
  }

  // Delete route
  $$('.delete-route-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Delete this route?')) return;
      try {
        await api('DELETE', '/api/routes/' + btn.dataset.routeId);
        toast('Route deleted');
        reloadCurrentTrip();
      } catch (err) {
        toast(err.message, 'error');
      }
    });
  });

  // Photo drop zone
  const dz = $('#photoDropZone');
  const fi = $('#photoFileInput');
  if (dz && fi) {
    dz.addEventListener('click', () => fi.click());
    dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', (e) => {
      e.preventDefault();
      dz.classList.remove('dragover');
      uploadPhotos(e.dataTransfer.files);
    });
    fi.addEventListener('change', () => {
      uploadPhotos(fi.files);
    });
  }

  // Photo clicks
  // Photo clicks: first click → fly to location on map, second click → open modal
  $$('.photo-thumb').forEach(thumb => {
    thumb.addEventListener('click', () => {
      const photoId = thumb.dataset.photoId;
      const photo = (trip.photos || []).find(p => p.id === photoId);
      if (!photo) return;

      if (state.focusedPhotoId === photoId) {
        // Second click on same photo → open modal
        openPhotoModal(photoId);
        return;
      }

      // First click → highlight and fly to location
      state.focusedPhotoId = photoId;
      $$('.photo-thumb').forEach(t => t.classList.remove('focused'));
      thumb.classList.add('focused');

      if (photo.lat != null && photo.lng != null) {
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(photo.lng, photo.lat, 4000),
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(-50), roll: 0 },
          duration: 1.5,
          complete: function() { viewer.scene.requestRender(); }
        });

        // Pulse the corresponding map marker
        highlightPhotoMarker(photoId);
      } else {
        // No location — just open the modal directly
        openPhotoModal(photoId);
      }
    });
  });
}

// ---------------------------------------------------------------
// Upload Worker — runs XHR in a dedicated Web Worker thread
// ---------------------------------------------------------------
// The worker receives the raw file bytes (ArrayBuffer, transferable)
// and builds the multipart/form-data body itself, then sends via XHR
// with upload progress events.

const UPLOAD_WORKER_SRC = [
  'self.onmessage = function(e) {',
  '  var job = e.data;',
  '  var boundary = "----UploadBoundary" + Date.now() + Math.random().toString(36);',
  '',
  '  // Build multipart body manually from the ArrayBuffer',
  '  var header = "--" + boundary + "\\r\\n"',
  '    + "Content-Disposition: form-data; name=\\"photo\\"; filename=\\"" + job.fileName + "\\"\\r\\n"',
  '    + "Content-Type: " + job.mimeType + "\\r\\n\\r\\n";',
  '  var footer = "\\r\\n--" + boundary + "--\\r\\n";',
  '',
  '  var headerBytes = new TextEncoder().encode(header);',
  '  var footerBytes = new TextEncoder().encode(footer);',
  '  var fileBytes = new Uint8Array(job.buffer);',
  '',
  '  var body = new Uint8Array(headerBytes.length + fileBytes.length + footerBytes.length);',
  '  body.set(headerBytes, 0);',
  '  body.set(fileBytes, headerBytes.length);',
  '  body.set(footerBytes, headerBytes.length + fileBytes.length);',
  '',
  '  var xhr = new XMLHttpRequest();',
  '  xhr.open("POST", job.url, true);',
  '  xhr.setRequestHeader("Content-Type", "multipart/form-data; boundary=" + boundary);',
  '',
  '  xhr.upload.onprogress = function(ev) {',
  '    if (ev.lengthComputable) {',
  '      self.postMessage({ type: "progress", id: job.id, loaded: ev.loaded, total: ev.total });',
  '    }',
  '  };',
  '',
  '  xhr.onload = function() {',
  '    if (xhr.status >= 200 && xhr.status < 300) {',
  '      var result = null;',
  '      try { result = JSON.parse(xhr.responseText); } catch(e) {}',
  '      self.postMessage({ type: "done", id: job.id, result: result });',
  '    } else {',
  '      self.postMessage({ type: "error", id: job.id, message: xhr.statusText || "HTTP " + xhr.status });',
  '    }',
  '  };',
  '',
  '  xhr.onerror = function() {',
  '    self.postMessage({ type: "error", id: job.id, message: "Network error" });',
  '  };',
  '',
  '  xhr.send(body.buffer);',
  '};',
].join('\n');

const uploadWorkerBlob = new Blob([UPLOAD_WORKER_SRC], { type: 'application/javascript' });
const uploadWorkerURL = URL.createObjectURL(uploadWorkerBlob);

let uploadIdCounter = 0;
const activeUploads = new Map();

function spawnUploadWorker() {
  const w = new Worker(uploadWorkerURL);
  w.onmessage = handleWorkerMessage;
  return w;
}

function handleWorkerMessage(e) {
  const msg = e.data;
  const info = activeUploads.get(msg.id);
  if (!info) return;

  if (msg.type === 'progress') {
    const pct = Math.round((msg.loaded / msg.total) * 100);
    updateUploadItemProgress(info, pct);
  } else if (msg.type === 'done') {
    updateUploadItemDone(info);
    activeUploads.delete(msg.id);
    info.worker.terminate();
    checkAllUploadsFinished();
  } else if (msg.type === 'error') {
    updateUploadItemError(info, msg.message || 'Upload failed');
    activeUploads.delete(msg.id);
    info.worker.terminate();
    checkAllUploadsFinished();
  }
}

function checkAllUploadsFinished() {
  if (activeUploads.size > 0) return;
  setTimeout(() => {
    reloadCurrentTrip();
    setTimeout(() => {
      const q = $('#uploadQueue');
      if (q) q.innerHTML = '';
    }, 4000);
  }, 300);
}

function createUploadItem(id, fileName, thumbURL) {
  const container = $('#uploadQueue');
  if (!container) return null;

  const el = document.createElement('div');
  el.className = 'upload-item';
  el.id = 'upload-' + id;
  el.innerHTML =
    '<img class="upload-thumb" src="' + (thumbURL || '') + '" alt="">' +
    '<div class="upload-info">' +
      '<div class="upload-name">' + escapeHtml(fileName) + '</div>' +
      '<div class="upload-status">Preparing…</div>' +
      '<div class="upload-bar-bg"><div class="upload-bar" id="bar-' + id + '"></div></div>' +
    '</div>' +
    '<span class="upload-pct" id="pct-' + id + '">0%</span>';

  container.appendChild(el);
  return el;
}

function updateUploadItemProgress(info, pct) {
  const bar = document.getElementById('bar-' + info.id);
  const pctEl = document.getElementById('pct-' + info.id);
  const statusEl = info.el?.querySelector('.upload-status');
  if (bar) bar.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (statusEl) {
    statusEl.textContent = 'Uploading… ' + formatBytes(pct * info.fileSize / 100) + ' / ' + formatBytes(info.fileSize);
  }
}

function updateUploadItemDone(info) {
  const bar = document.getElementById('bar-' + info.id);
  const pctEl = document.getElementById('pct-' + info.id);
  const statusEl = info.el?.querySelector('.upload-status');
  if (bar) { bar.style.width = '100%'; bar.classList.add('done'); }
  if (pctEl) pctEl.outerHTML = '<span class="upload-check">✅</span>';
  if (statusEl) {
    statusEl.textContent = 'Complete — EXIF location extracted';
    statusEl.style.color = 'var(--green)';
  }
}

function updateUploadItemError(info, message) {
  const bar = document.getElementById('bar-' + info.id);
  const pctEl = document.getElementById('pct-' + info.id);
  const statusEl = info.el?.querySelector('.upload-status');
  if (bar) { bar.style.width = '100%'; bar.classList.add('error'); }
  if (pctEl) pctEl.outerHTML = '<span class="upload-error-icon">❌</span>';
  if (statusEl) {
    statusEl.textContent = message;
    statusEl.style.color = 'var(--red)';
  }
  toast('Failed: ' + info.name, 'error');
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

window.uploadPhotos = uploadPhotos;
function uploadPhotos(files) {
  const trip = state.currentTrip;
  if (!trip) return;

  const url = window.location.origin + '/api/trips/' + trip.id + '/photos';

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const id = ++uploadIdCounter;

    // Create thumbnail preview from file
    const thumbURL = URL.createObjectURL(file);
    const el = createUploadItem(id, file.name, thumbURL);

    // Read file as ArrayBuffer, then transfer to worker
    const reader = new FileReader();
    reader.onload = function() {
      const buffer = reader.result;
      const worker = spawnUploadWorker();

      activeUploads.set(id, {
        id: id,
        name: file.name,
        el: el,
        fileSize: file.size,
        worker: worker,
      });

      // Update status to show uploading
      const statusEl = el?.querySelector('.upload-status');
      if (statusEl) statusEl.textContent = 'Uploading…';

      // Transfer the ArrayBuffer to the worker (zero-copy)
      worker.postMessage({
        id: id,
        url: url,
        fileName: file.name,
        mimeType: file.type || 'image/jpeg',
        buffer: buffer,
      }, [buffer]);
    };
    reader.readAsArrayBuffer(file);
  }

  if (files.length > 0) {
    toast(files.length + ' photo(s) queued for upload');
  }
}

// ---------------------------------------------------------------
// Photo modal
// ---------------------------------------------------------------
function openPhotoModal(photoId) {
  const trip = state.currentTrip;
  if (!trip) return;
  const photo = (trip.photos || []).find(p => p.id === photoId);
  if (!photo) return;

  state.selectedPhotoId = photoId;
  $('#photoModalImg').src = '/uploads/' + photo.filename;
  $('#photoModalCaption').value = photo.caption || '';
  $('#photoModal').classList.add('active');
}

$('#photoModalClose').addEventListener('click', () => {
  $('#photoModal').classList.remove('active');
  state.selectedPhotoId = null;
  state.focusedPhotoId = null;
});

$('#photoModal').addEventListener('click', (e) => {
  if (e.target === $('#photoModal')) {
    $('#photoModal').classList.remove('active');
    state.selectedPhotoId = null;
    state.focusedPhotoId = null;
  }
});

$('#photoModalSave').addEventListener('click', async () => {
  if (!state.selectedPhotoId) return;
  const photo = (state.currentTrip.photos || []).find(p => p.id === state.selectedPhotoId);
  if (!photo) return;
  try {
    await api('PUT', '/api/photos/' + photo.id, {
      caption: $('#photoModalCaption').value,
      lat: photo.lat,
      lng: photo.lng,
      stop_id: photo.stop_id,
    });
    toast('Caption saved');
    reloadCurrentTrip();
  } catch (err) {
    toast(err.message, 'error');
  }
});

$('#photoModalGeotag').addEventListener('click', () => {
  if (!state.selectedPhotoId) return;
  state.geotagMode = true;
  state.geotagPhotoId = state.selectedPhotoId;
  $('#photoModal').classList.remove('active');
  $('#geotagIndicator').classList.add('active');
  viewer.canvas.style.cursor = 'crosshair';
});

$('#cancelGeotag').addEventListener('click', () => {
  state.geotagMode = false;
  state.geotagPhotoId = null;
  $('#geotagIndicator').classList.remove('active');
  viewer.canvas.style.cursor = '';
});

$('#photoModalDelete').addEventListener('click', async () => {
  if (!state.selectedPhotoId) return;
  if (!confirm('Delete this photo?')) return;
  try {
    await api('DELETE', '/api/photos/' + state.selectedPhotoId);
    toast('Photo deleted');
    $('#photoModal').classList.remove('active');
    state.selectedPhotoId = null;
    reloadCurrentTrip();
  } catch (err) {
    toast(err.message, 'error');
  }
});

async function setPhotoLocation(photoId, lat, lng) {
  const photo = (state.currentTrip.photos || []).find(p => p.id === photoId);
  if (!photo) return;
  try {
    await api('PUT', '/api/photos/' + photoId, {
      caption: photo.caption || '',
      lat: lat,
      lng: lng,
      stop_id: photo.stop_id,
    });
    toast('Photo location set!');
    state.geotagMode = false;
    state.geotagPhotoId = null;
    $('#geotagIndicator').classList.remove('active');
    viewer.canvas.style.cursor = '';
    reloadCurrentTrip();
  } catch (err) {
    toast(err.message, 'error');
  }
}

// ---------------------------------------------------------------
// Stops
// ---------------------------------------------------------------
async function addStopAtLocation(lat, lng) {
  const trip = state.currentTrip;
  if (!trip) return;
  state.addStopMode = false;
  $('#stopIndicator').classList.remove('active');
  viewer.canvas.style.cursor = '';

  const title = await customPrompt('Stop name:', '');
  if (title === null) return;

  try {
    await api('POST', '/api/trips/' + trip.id + '/stops', {
      title: title || 'New Stop',
      description: '',
      lat: lat,
      lng: lng,
    });
    toast('Stop added!');
    reloadCurrentTrip();
  } catch (err) {
    toast(err.message, 'error');
  }
}

function openEditStop(stopId) {
  const trip = state.currentTrip;
  if (!trip) return;
  const stop = (trip.stops || []).find(s => s.id === stopId);
  if (!stop) return;

  $('#editStopTitle').textContent = 'Edit Stop';
  $('#editStopName').value = stop.title || '';
  $('#editStopDesc').value = stop.description || '';
  if (stop.arrived_at) {
    const d = new Date(stop.arrived_at);
    // format for datetime-local input
    const pad = (n) => String(n).padStart(2, '0');
    const val = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    $('#editStopDate').value = val;
  } else {
    $('#editStopDate').value = '';
  }
  $('#editStopModal').classList.add('active');

  // Wire save
  const saveHandler = async () => {
    const arrived = $('#editStopDate').value ? new Date($('#editStopDate').value).toISOString() : null;
    try {
      await api('PUT', '/api/stops/' + stopId, {
        title: $('#editStopName').value,
        description: $('#editStopDesc').value,
        lat: stop.lat,
        lng: stop.lng,
        elevation: stop.elevation || 0,
        stop_order: stop.stop_order,
        arrived_at: arrived,
      });
      toast('Stop updated');
      $('#editStopModal').classList.remove('active');
      $('#editStopSave').removeEventListener('click', saveHandler);
      reloadCurrentTrip();
    } catch (err) {
      toast(err.message, 'error');
    }
  };

  // Remove old listeners by cloning
  const oldSave = $('#editStopSave');
  const newSave = oldSave.cloneNode(true);
  oldSave.parentNode.replaceChild(newSave, oldSave);
  newSave.addEventListener('click', saveHandler);

  const oldCancel = $('#editStopCancel');
  const newCancel = oldCancel.cloneNode(true);
  oldCancel.parentNode.replaceChild(newCancel, oldCancel);
  newCancel.addEventListener('click', () => {
    $('#editStopModal').classList.remove('active');
  });
}

// ---------------------------------------------------------------
// Route Drawing
// ---------------------------------------------------------------
function startDrawing() {
  state.drawMode = true;
  state.drawPoints = [];
  $('#drawIndicator').classList.add('active');
  viewer.canvas.style.cursor = 'crosshair';
}

function updateDrawPreview() {
  // Remove old draw preview entities
  viewer.entities.values
    .filter(e => e._isDrawPreview)
    .forEach(e => viewer.entities.remove(e));

  // Draw line
  if (state.drawPoints.length >= 2) {
    const positions = state.drawPoints.map(p => Cesium.Cartesian3.fromDegrees(p[0], p[1]));
    const lineEntity = viewer.entities.add({
      polyline: {
        positions: positions,
        width: 3,
        material: new Cesium.PolylineDashMaterialProperty({
          color: Cesium.Color.fromCssColorString('#3b82f6'),
          dashLength: 16,
        }),
        clampToGround: true,
      }
    });
    lineEntity._isDrawPreview = true;
  }

  // Draw points
  state.drawPoints.forEach(pt => {
    const ptEntity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(pt[0], pt[1]),
      point: {
        pixelSize: 8,
        color: Cesium.Color.fromCssColorString('#3b82f6'),
        outlineColor: Cesium.Color.WHITE,
        outlineWidth: 2,
        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
      }
    });
    ptEntity._isDrawPreview = true;
  });
}

async function finishDrawing() {
  state.drawMode = false;
  $('#drawIndicator').classList.remove('active');
  viewer.canvas.style.cursor = '';

  // Clear draw preview
  viewer.entities.values
    .filter(e => e._isDrawPreview)
    .forEach(e => viewer.entities.remove(e));

  if (state.drawPoints.length < 2) {
    toast('Need at least 2 points', 'error');
    return;
  }

  const name = await customPrompt('Route name:', 'My Route') || 'My Route';

  const geojsonObj = {
    type: 'FeatureCollection',
    features: [{
      type: 'Feature',
      properties: { name: name },
      geometry: { type: 'LineString', coordinates: state.drawPoints },
    }],
  };

  try {
    await api('POST', '/api/trips/' + state.currentTrip.id + '/routes', {
      name: name,
      geojson: JSON.stringify(geojsonObj),
      color: '#3b82f6',
    });
    toast('Route saved!');
    state.drawPoints = [];
    reloadCurrentTrip();
  } catch (err) {
    toast(err.message, 'error');
  }
}

$('#cancelDraw').addEventListener('click', () => {
  state.drawMode = false;
  state.drawPoints = [];
  $('#drawIndicator').classList.remove('active');
  viewer.canvas.style.cursor = '';
  viewer.entities.values
    .filter(e => e._isDrawPreview)
    .forEach(e => viewer.entities.remove(e));
});

// ---------------------------------------------------------------
// Map data rendering (Cesium entities)
// ---------------------------------------------------------------
function clearMapData() {
  // Remove all trip-related entities (but not draw preview)
  viewer.entities.values
    .filter(e => e._isTripData)
    .forEach(e => viewer.entities.remove(e));
  state.mapMarkers = [];
  state.photoMarkers = [];
  state.focusedPhotoId = null;
  closeGlobePopup();
}

function renderMapData() {
  clearMapData();
  const trip = state.currentTrip;
  if (!trip) return;

  const stops = trip.stops || [];
  const photos = trip.photos || [];
  const routes = trip.routes || [];

  // Render routes as polylines
  routes.forEach(route => {
    let geojson;
    try {
      geojson = typeof route.geojson === 'string' ? JSON.parse(route.geojson) : route.geojson;
    } catch (e) { return; }

    const color = Cesium.Color.fromCssColorString(route.color || '#3388ff').withAlpha(0.85);
    if (geojson.features) {
      geojson.features.forEach(f => {
        if (f.geometry && f.geometry.type === 'LineString') {
          const positions = f.geometry.coordinates.map(c => Cesium.Cartesian3.fromDegrees(c[0], c[1]));
          const e = viewer.entities.add({
            polyline: {
              positions: positions,
              width: 5,
              material: color,
              clampToGround: true,
            }
          });
          e._isTripData = true;
        }
      });
    }
  });

  // Render stop markers as labeled billboards
  stops.sort((a, b) => a.stop_order - b.stop_order);
  stops.forEach((stop, i) => {
    // Create a canvas-based pin icon
    const canvas = document.createElement('canvas');
    canvas.width = 48; canvas.height = 48;
    const ctx = canvas.getContext('2d');
    // Circle
    ctx.beginPath(); ctx.arc(24, 24, 20, 0, Math.PI * 2);
    ctx.fillStyle = '#f59e0b'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = 'white'; ctx.stroke();
    // Number
    ctx.fillStyle = '#1a1a2e'; ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(i + 1), 24, 25);

    const entity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(stop.lng, stop.lat, 10),
      billboard: {
        image: canvas.toDataURL(),
        width: 36,
        height: 36,
        verticalOrigin: Cesium.VerticalOrigin.CENTER,
        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
      },
      label: {
        text: stop.title || 'Stop ' + (i + 1),
        font: 'bold 13px sans-serif',
        fillColor: Cesium.Color.WHITE,
        outlineColor: Cesium.Color.BLACK,
        outlineWidth: 3,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        pixelOffset: new Cesium.Cartesian2(0, -28),
        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
      }
    });
    entity._isTripData = true;
    entity._stopData = stop;
    state.mapMarkers.push(entity);
  });

  // Render photo markers – place entities immediately with a simple placeholder,
  // then load actual thumbnail images in small batches to avoid stutter.
  const photoEntities = [];
  photos.forEach(photo => {
    if (photo.lat == null || photo.lng == null) return;

    // Lightweight placeholder: a small blue dot (the point graphic) until the image loads
    const photoEntity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(photo.lng, photo.lat, 15),
      point: {
        pixelSize: 14,
        color: Cesium.Color.WHITE,
        outlineColor: Cesium.Color.fromCssColorString('#3b82f6'),
        outlineWidth: 3,
        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
      }
    });
    photoEntity._isTripData = true;
    photoEntity._photoData = photo;
    state.photoMarkers.push(photoEntity);
    photoEntities.push({ entity: photoEntity, photo: photo });
  });

  // Fit view immediately (before thumbnails load)
  fitMapToTrip();

  // Batch-load thumbnails after the fly animation has started
  const BATCH = 4;
  async function loadPhotoBatch(startIdx) {
    const batch = photoEntities.slice(startIdx, startIdx + BATCH);
    if (batch.length === 0) return;
    await Promise.all(batch.map(({ entity, photo }) => new Promise(resolve => {
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function() {
        ctx.save();
        ctx.beginPath(); ctx.arc(32, 32, 28, 0, Math.PI * 2); ctx.clip();
        const s = Math.min(img.width, img.height);
        const sx = (img.width - s) / 2;
        const sy = (img.height - s) / 2;
        ctx.drawImage(img, sx, sy, s, s, 4, 4, 56, 56);
        ctx.restore();
        ctx.beginPath(); ctx.arc(32, 32, 29, 0, Math.PI * 2);
        ctx.lineWidth = 3; ctx.strokeStyle = 'white'; ctx.stroke();
        if (entity.billboard) {
          entity.billboard.image = canvas.toDataURL();
        } else {
          entity.billboard = new Cesium.BillboardGraphics({
            image: canvas.toDataURL(),
            width: 44,
            height: 44,
            verticalOrigin: Cesium.VerticalOrigin.CENTER,
            heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
            disableDepthTestDistance: Number.POSITIVE_INFINITY,
          });
          // Hide the placeholder dot once billboard is ready
          if (entity.point) entity.point.show = false;
        }
        viewer.scene.requestRender();
        resolve();
      };
      img.onerror = resolve;
      img.src = '/thumb/' + photo.filename;
    })));
    // Small delay between batches to let the renderer breathe
    await new Promise(r => setTimeout(r, 80));
    await loadPhotoBatch(startIdx + BATCH);
  }
  // Start loading thumbnails after a brief delay (let fly-to begin)
  setTimeout(() => loadPhotoBatch(0), 400);
}

function fitMapToTrip() {
  const tripEntities = viewer.entities.values.filter(e => e._isTripData);
  if (tripEntities.length === 0) return;

  // Compute bounding box from trip entities
  let minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
  let count = 0;
  tripEntities.forEach(e => {
    if (!e.position) return;
    const cart = Cesium.Cartographic.fromCartesian(
      e.position.getValue ? e.position.getValue(Cesium.JulianDate.now()) : e.position
    );
    if (!cart) return;
    const lat = Cesium.Math.toDegrees(cart.latitude);
    const lng = Cesium.Math.toDegrees(cart.longitude);
    if (lat < minLat) minLat = lat;
    if (lat > maxLat) maxLat = lat;
    if (lng < minLng) minLng = lng;
    if (lng > maxLng) maxLng = lng;
    count++;
  });
  if (count === 0) return;

  // Add padding around the bounding box
  const latSpan = Math.max(maxLat - minLat, 0.005);
  const lngSpan = Math.max(maxLng - minLng, 0.005);
  const pad = 0.3; // 30% padding
  minLat -= latSpan * pad;
  maxLat += latSpan * pad;
  minLng -= lngSpan * pad;
  maxLng += lngSpan * pad;

  const rect = Cesium.Rectangle.fromDegrees(minLng, minLat, maxLng, maxLat);

  // Compute a reasonable altitude based on extent of data
  const extentKm = Math.max(
    latSpan * 111,
    lngSpan * 111 * Math.cos(Cesium.Math.toRadians((minLat + maxLat) / 2))
  );
  // Altitude: 2x extent in meters, minimum 15km (so you see context), max 8M
  const altitude = Math.min(8000000, Math.max(15000, extentKm * 2000));

  const centerLat = (minLat + maxLat) / 2;
  const centerLng = (minLng + maxLng) / 2;

  // Use steeper (more top-down) pitch for tight clusters, shallower for wide areas
  const pitch = extentKm < 5 ? -75 : -55;

  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(centerLng, centerLat, altitude),
    orientation: {
      heading: 0,
      pitch: Cesium.Math.toRadians(pitch),
      roll: 0,
    },
    duration: 2.0,
    complete: function() {
      viewer.scene.requestRender();
    }
  });
}

// Highlight a photo marker on the globe (pulse effect)
function highlightPhotoMarker(photoId) {
  // Reset all photo markers to normal size
  state.photoMarkers.forEach(m => {
    if (m.billboard) {
      m.billboard.width = 44;
      m.billboard.height = 44;
    }
    if (m.point) {
      m.point.pixelSize = 14;
    }
  });
  // Find and enlarge the target marker
  const target = state.photoMarkers.find(m => m._photoData && m._photoData.id === photoId);
  if (target) {
    if (target.billboard && target.billboard.image) {
      target.billboard.width = 64;
      target.billboard.height = 64;
    }
    if (target.point) {
      target.point.pixelSize = 20;
    }
    viewer.scene.requestRender();
  }
}

// ---------------------------------------------------------------
// Timeline View
// ---------------------------------------------------------------
function renderTimeline() {
  const trip = state.currentTrip;
  if (!trip) return;

  const stops = (trip.stops || []).slice().sort((a, b) => a.stop_order - b.stop_order);
  const photos = trip.photos || [];

  if (stops.length === 0) {
    timelineContent.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><h3>No story yet</h3><p>Add stops to your trip to see them here as a timeline!</p></div>';
    return;
  }

  let html = '<div class="timeline">';
  stops.forEach(stop => {
    const stopPhotos = photos.filter(p => p.stop_id === stop.id);
    // Also include photos near this stop (within ~500m)
    const nearbyPhotos = photos.filter(p => {
      if (p.stop_id) return false;
      if (p.lat == null || p.lng == null) return false;
      const dx = (p.lng - stop.lng) * Math.cos(stop.lat * Math.PI / 180) * 111320;
      const dy = (p.lat - stop.lat) * 111320;
      return Math.sqrt(dx * dx + dy * dy) < 500;
    });
    const allPhotos = stopPhotos.concat(nearbyPhotos);

    html += '<div class="timeline-card" data-lat="' + stop.lat + '" data-lng="' + stop.lng + '">';
    if (stop.arrived_at) {
      html += '<div class="tc-date">' + formatDate(stop.arrived_at) + '</div>';
    }
    html += '<h3>' + escapeHtml(stop.title || 'Untitled Stop') + '</h3>';
    if (stop.description) {
      html += '<div class="tc-desc">' + escapeHtml(stop.description) + '</div>';
    }
    if (allPhotos.length > 0) {
      html += '<div class="timeline-photos">';
      allPhotos.forEach(p => {
        html += '<img src="/uploads/' + escapeHtml(p.filename) + '" alt="' + escapeHtml(p.caption || '') + '" loading="lazy">';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  timelineContent.innerHTML = html;

  // Click to fly
  $$('.timeline-card').forEach(card => {
    card.addEventListener('click', () => {
      const lat = parseFloat(card.dataset.lat);
      const lng = parseFloat(card.dataset.lng);
      if (!isNaN(lat) && !isNaN(lng)) {
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lng, lat, 8000),
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(-45), roll: 0 },
          duration: 1.5,
        });
      }
    });
  });
}

  if (e.key === 'Escape') {
    // Close modals
    $('#createTripModal').classList.remove('active');
    $('#editStopModal').classList.remove('active');
    if ($('#photoModal').classList.contains('active')) {
      $('#photoModal').classList.remove('active');
      state.selectedPhotoId = null;
    }
    // Cancel modes
    if (state.drawMode) {
      state.drawMode = false;
      state.drawPoints = [];
      $('#drawIndicator').classList.remove('active');
      viewer.canvas.style.cursor = '';
      viewer.entities.values
        .filter(e => e._isDrawPreview)
        .forEach(e => viewer.entities.remove(e));
    }
    if (state.geotagMode) {
      state.geotagMode = false;
      state.geotagPhotoId = null;
      $('#geotagIndicator').classList.remove('active');
      viewer.canvas.style.cursor = '';
    }
    if (state.addStopMode) {
      state.addStopMode = false;
      $('#stopIndicator').classList.remove('active');
      viewer.canvas.style.cursor = '';
    }
  }
});
