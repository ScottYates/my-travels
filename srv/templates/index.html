function startDrawing() {
  state.drawMode = true;
  state.drawPoints = [];
  $('#drawIndicator').classList.add('active');
  viewer.canvas.style.cursor = 'crosshair';
}

function updateDrawPreview() {
  // Remove old draw preview entities
  viewer.entities.values
    .filter(e => e._isDrawPreview)
    .forEach(e => viewer.entities.remove(e));

  // Draw line
  if (state.drawPoints.length >= 2) {
    const positions = state.drawPoints.map(p => Cesium.Cartesian3.fromDegrees(p[0], p[1]));
    const lineEntity = viewer.entities.add({
      polyline: {
        positions: positions,
        width: 3,
        material: new Cesium.PolylineDashMaterialProperty({
          color: Cesium.Color.fromCssColorString('#3b82f6'),
          dashLength: 16,
        }),
        clampToGround: true,
      }
    });
    lineEntity._isDrawPreview = true;
  }

  // Draw points
  state.drawPoints.forEach(pt => {
    const ptEntity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(pt[0], pt[1]),
      point: {
        pixelSize: 8,
        color: Cesium.Color.fromCssColorString('#3b82f6'),
        outlineColor: Cesium.Color.WHITE,
        outlineWidth: 2,
        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
      }
    });
    ptEntity._isDrawPreview = true;
  });
}

async function finishDrawing() {
  state.drawMode = false;
  $('#drawIndicator').classList.remove('active');
  viewer.canvas.style.cursor = '';

  // Clear draw preview
  viewer.entities.values
    .filter(e => e._isDrawPreview)
    .forEach(e => viewer.entities.remove(e));

  if (state.drawPoints.length < 2) {
    toast('Need at least 2 points', 'error');
    return;
  }

  const name = await customPrompt('Route name:', 'My Route') || 'My Route';

  const geojsonObj = {
    type: 'FeatureCollection',
    features: [{
      type: 'Feature',
      properties: { name: name },
      geometry: { type: 'LineString', coordinates: state.drawPoints },
    }],
  };

  try {
    await api('POST', '/api/trips/' + state.currentTrip.id + '/routes', {
      name: name,
      geojson: JSON.stringify(geojsonObj),
      color: '#3b82f6',
    });
    toast('Route saved!');
    state.drawPoints = [];
    reloadCurrentTrip();
  } catch (err) {
    toast(err.message, 'error');
  }
}

$('#cancelDraw').addEventListener('click', () => {
  state.drawMode = false;
  state.drawPoints = [];
  $('#drawIndicator').classList.remove('active');
  viewer.canvas.style.cursor = '';
  viewer.entities.values
    .filter(e => e._isDrawPreview)
    .forEach(e => viewer.entities.remove(e));
});

// ---------------------------------------------------------------
// Map data rendering (Cesium entities)
// ---------------------------------------------------------------
var _photoLoadGeneration = 0; // cancellation token for async photo thumbnail loading

// Fly to a stop, using saved camera view if available, otherwise default offset view
function flyToStop(stop) {
  let dest, heading, pitch;
  if (stop.cam_lng != null && stop.cam_lat != null && stop.cam_height != null) {
    dest = Cesium.Cartesian3.fromDegrees(stop.cam_lng, stop.cam_lat, stop.cam_height);
    heading = stop.cam_heading != null ? stop.cam_heading : 0;
    pitch = stop.cam_pitch != null ? stop.cam_pitch : Cesium.Math.toRadians(-45);
  } else {
    const camHeight = 12000;
    const latOffset = camHeight / 111320;
    dest = Cesium.Cartesian3.fromDegrees(stop.lng, stop.lat - latOffset, camHeight);
    heading = 0;
    pitch = Cesium.Math.toRadians(-45);
  }
  const d = Math.max(0.8, Math.min(3.0, Cesium.Cartesian3.distance(viewer.camera.positionWC, dest) / 5000));
  viewer.camera.flyTo({
    destination: dest,
    orientation: { heading: heading, pitch: pitch, roll: 0 },
    duration: d,
    easingFunction: Cesium.EasingFunction.QUADRATIC_IN_OUT,
  });
}

function clearMapData() {
  // Cancel any in-progress photo thumbnail loading
  _photoLoadGeneration++;
  // Collect references before removal to ensure proper cleanup
  const toRemove = viewer.entities.values.filter(e => e._isTripData);
  // Hide all trip entities immediately to prevent ghost rendering
  for (let i = 0; i < toRemove.length; i++) {
    toRemove[i].show = false;
  }
  // Now remove them
  for (let i = 0; i < toRemove.length; i++) {
    viewer.entities.remove(toRemove[i]);
  }
  state.mapMarkers = [];
  state.photoMarkers = [];
  state.focusedPhotoId = null;
  closeGlobePopup();
  $('#camToolbar').classList.remove('active');
  // Force scene to re-render to clear visual artifacts
  viewer.scene.requestRender();
}

function renderMapData() {
  clearMapData();
  const trip = state.currentTrip;
  if (!trip) return;

  const stops = trip.stops || [];
  const photos = trip.photos || [];
  const routes = trip.routes || [];

  // Render routes as polylines
  routes.forEach(route => {
    let geojson;
    try {
      geojson = typeof route.geojson === 'string' ? JSON.parse(route.geojson) : route.geojson;
    } catch (e) { return; }

    const color = Cesium.Color.fromCssColorString(route.color || '#3388ff').withAlpha(0.85);
    if (geojson.features) {
      geojson.features.forEach(f => {
        if (f.geometry && f.geometry.type === 'LineString') {
          const positions = f.geometry.coordinates.map(c => Cesium.Cartesian3.fromDegrees(c[0], c[1]));
          const e = viewer.entities.add({
            polyline: {
              positions: positions,
              width: 5,
              material: color,
              clampToGround: true,
            }
          });
          e._isTripData = true;
        }
      });
    }
  });

  // Render stop markers as labeled billboards
  stops.sort((a, b) => a.stop_order - b.stop_order);
  stops.forEach((stop, i) => {
    // Create a canvas-based pin icon
    const canvas = document.createElement('canvas');
    canvas.width = 48; canvas.height = 48;
    const ctx = canvas.getContext('2d');
    // Circle
    ctx.beginPath(); ctx.arc(24, 24, 20, 0, Math.PI * 2);
    ctx.fillStyle = '#f59e0b'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = 'white'; ctx.stroke();
    // Number
    ctx.fillStyle = '#1a1a2e'; ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(i + 1), 24, 25);

    const entity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(stop.lng, stop.lat, 10),
      billboard: {
        image: canvas.toDataURL(),
        width: 36,
        height: 36,
        verticalOrigin: Cesium.VerticalOrigin.CENTER,
        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
        disableDepthTestDistance: 100000,
      },

    });
    entity._isTripData = true;
    entity._stopData = stop;
    state.mapMarkers.push(entity);
  });

  // Render photo markers – place entities immediately with a simple placeholder,
  // then load actual thumbnail images in small batches to avoid stutter.
  const photoEntities = [];
  photos.forEach(photo => {
    if (photo.lat == null || photo.lng == null) return;

    // Lightweight placeholder: a small blue dot until the thumbnail image loads
    const photoEntity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(photo.lng, photo.lat, 15),
      point: {
        pixelSize: 14,
        color: Cesium.Color.WHITE,
        outlineColor: Cesium.Color.fromCssColorString('#3b82f6'),
        outlineWidth: 3,
        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
        disableDepthTestDistance: 100000,
      }
    });
    photoEntity._isTripData = true;
    photoEntity._photoData = photo;
    state.photoMarkers.push(photoEntity);
    photoEntities.push({ entity: photoEntity, photo: photo });
  });

  // Fit view immediately (before thumbnails load)
  fitMapToTrip();

  // Batch-load thumbnails after the fly animation has started
  const BATCH = 4;
  const gen = ++_photoLoadGeneration; // capture generation for cancellation
  async function loadPhotoBatch(startIdx) {
    if (_photoLoadGeneration !== gen) return; // cancelled
    const batch = photoEntities.slice(startIdx, startIdx + BATCH);
    if (batch.length === 0) return;
    await Promise.all(batch.map(({ entity, photo }) => new Promise(resolve => {
      if (_photoLoadGeneration !== gen) { resolve(); return; }
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function() {
        if (_photoLoadGeneration !== gen) { resolve(); return; }
        ctx.save();
        ctx.beginPath(); ctx.arc(32, 32, 28, 0, Math.PI * 2); ctx.clip();
        const s = Math.min(img.width, img.height);
        const sx = (img.width - s) / 2;
        const sy = (img.height - s) / 2;
        ctx.drawImage(img, sx, sy, s, s, 4, 4, 56, 56);
        ctx.restore();
        ctx.beginPath(); ctx.arc(32, 32, 29, 0, Math.PI * 2);
        ctx.lineWidth = 3; ctx.strokeStyle = 'white'; ctx.stroke();
        entity.billboard = new Cesium.BillboardGraphics({
          image: canvas.toDataURL(),
          width: 44,
          height: 44,
          verticalOrigin: Cesium.VerticalOrigin.CENTER,
          heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
          disableDepthTestDistance: 100000,
        });
        if (entity.point) entity.point.show = false;
        viewer.scene.requestRender();
        resolve();
      };
      img.onerror = resolve;
      img.src = '/thumb/' + photo.filename;
    })));
    if (_photoLoadGeneration !== gen) return; // cancelled
    // Small delay between batches to let the renderer breathe
    await new Promise(r => setTimeout(r, 80));
    await loadPhotoBatch(startIdx + BATCH);
  }
  // Start loading thumbnails after a brief delay (let fly-to begin)
  setTimeout(() => loadPhotoBatch(0), 400);
}

function fitMapToTrip() {
  const tripEntities = viewer.entities.values.filter(e => e._isTripData);
  if (tripEntities.length === 0) return;

  // Compute bounding box from trip entities
  let minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
  let count = 0;
  tripEntities.forEach(e => {
    if (!e.position) return;
    const cart = Cesium.Cartographic.fromCartesian(
      e.position.getValue ? e.position.getValue(Cesium.JulianDate.now()) : e.position
    );
    if (!cart) return;
    const lat = Cesium.Math.toDegrees(cart.latitude);
    const lng = Cesium.Math.toDegrees(cart.longitude);
    if (lat < minLat) minLat = lat;
    if (lat > maxLat) maxLat = lat;
    if (lng < minLng) minLng = lng;
    if (lng > maxLng) maxLng = lng;
    count++;
  });
  if (count === 0) return;

  // Add padding around the bounding box
  const latSpan = Math.max(maxLat - minLat, 0.005);
  const lngSpan = Math.max(maxLng - minLng, 0.005);
  const pad = 0.3; // 30% padding
  minLat -= latSpan * pad;
  maxLat += latSpan * pad;
  minLng -= lngSpan * pad;
  maxLng += lngSpan * pad;

  // Compute extent in km (accounting for latitude)
  const extentKm = Math.max(
    latSpan * 111,
    lngSpan * 111 * Math.cos(Cesium.Math.toRadians((minLat + maxLat) / 2))
  );

  // For very wide-spanning trips (>120° longitude or >5000km), use Cesium's
  // built-in zoomTo which handles globe wrapping and framing properly
  if (lngSpan > 120 || extentKm > 5000) {
    const tripEnts = viewer.entities.values.filter(e => e._isTripData);
    viewer.zoomTo(tripEnts, new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-90), 0));
    return;
  }

  // Altitude: 2x extent in meters, minimum 15km (so you see context), max 8M
  const altitude = Math.min(8000000, Math.max(15000, extentKm * 2000));

  const centerLat = (minLat + maxLat) / 2;
  const centerLng = (minLng + maxLng) / 2;

  // Use steeper (more top-down) pitch for tight clusters, shallower for wide areas
  const pitch = extentKm < 5 ? -75 : extentKm < 500 ? -55 : -65;

  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(centerLng, centerLat, altitude),
    orientation: {
      heading: 0,
      pitch: Cesium.Math.toRadians(pitch),
      roll: 0,
    },
    duration: 2.5,
    easingFunction: Cesium.EasingFunction.QUADRATIC_IN_OUT,
    complete: function() {
      viewer.scene.requestRender();
    }
  });
}

}

// Compute HeadingPitchRange from current camera to a lat/lng target
function getCameraHPR(lat, lng) {
  const targetCart = Cesium.Cartesian3.fromDegrees(lng, lat, 15);
  const camPos = viewer.camera.positionWC;
  const offset = Cesium.Cartesian3.subtract(camPos, targetCart, new Cesium.Cartesian3());
  const range = Cesium.Cartesian3.magnitude(offset);
  const transform = Cesium.Transforms.eastNorthUpToFixedFrame(targetCart);
  const invTransform = Cesium.Matrix4.inverseTransformation(transform, new Cesium.Matrix4());
  const localOffset = Cesium.Matrix4.multiplyByPoint(invTransform, camPos, new Cesium.Cartesian3());
  // Cesium HeadingPitchRange heading = direction camera LOOKS (not where camera IS)
  // So we negate the offset to get the look-toward-target direction
  const heading = Math.atan2(-localOffset.x, -localOffset.y);
  const horizontalDist = Math.sqrt(localOffset.x * localOffset.x + localOffset.y * localOffset.y);
  const pitch = -Math.atan2(localOffset.z, horizontalDist);
  return {
    heading: Cesium.Math.toDegrees(heading),
    pitch: Cesium.Math.toDegrees(pitch),
    range: range
  };
}

// Show/hide the camera toolbar and update info text

  const photo = (state.currentTrip.photos || []).find(p => p.id === state.focusedPhotoId);

  } else if (state.currentTrip.default_cam_range != null) {
    info.innerHTML = '<span class="cam-dot default"></span> Trip default';
  } else {
    info.innerHTML = '<span class="cam-dot none"></span> Auto view';
  }
}

// Get the camera offset for a photo: per-photo > trip default > hardcoded
function getPhotoFlyOffset(photo) {
  const trip = state.currentTrip;
  let h = 0, p = -35, r = 2500;

  if (photo.cam_range != null) {
    h = photo.cam_heading || 0;
    p = photo.cam_pitch || -35;
    r = photo.cam_range;
  } else if (trip && trip.default_cam_range != null) {
    h = trip.default_cam_heading || 0;
    p = trip.default_cam_pitch || -35;
    r = trip.default_cam_range;
  }

  return { headingDeg: h, pitchDeg: p, range: r };
}

// Compute camera destination + orientation from a target lat/lng and HPR offset
function computeCameraFromHPR(lat, lng, hpr) {
  const hRad = Cesium.Math.toRadians(hpr.headingDeg);
  const pRad = Cesium.Math.toRadians(hpr.pitchDeg);
  const r = hpr.range;

  // Camera position in ENU frame of the target
  // HeadingPitchRange heading = direction camera LOOKS, so camera IS in opposite direction
  const cosP = Math.cos(pRad);
  const sinP = Math.sin(pRad);
  const east  = -r * cosP * Math.sin(hRad);
  const north = -r * cosP * Math.cos(hRad);
  const up    = -r * sinP; // pitch negative = above, so up is positive

  const targetCart = Cesium.Cartesian3.fromDegrees(lng, lat, 15);
  const enu = Cesium.Transforms.eastNorthUpToFixedFrame(targetCart);
  const localOffset = new Cesium.Cartesian3(east, north, up);
  const destination = Cesium.Matrix4.multiplyByPoint(enu, localOffset, new Cesium.Cartesian3());

  return {
    destination: destination,
    orientation: {
      heading: hRad,
      pitch: pRad,
      roll: 0,
    }
  };
}

// Fly the camera to a photo with smooth interpolation and adaptive duration
function flyToPhoto(photo, callback) {
  const hpr = getPhotoFlyOffset(photo);
  const cam = computeCameraFromHPR(photo.lat, photo.lng, hpr);

  // Adaptive duration based on distance from current camera position
  const currentPos = viewer.camera.positionWC;
  const dist = Cesium.Cartesian3.distance(currentPos, cam.destination);
  // Short hops (< 5km) are quick; cross-globe flights take longer
  const duration = Math.max(0.8, Math.min(3.0, dist / 5000));

  viewer.camera.flyTo({
    destination: cam.destination,
    orientation: cam.orientation,
    duration: duration,
    easingFunction: Cesium.EasingFunction.QUADRATIC_IN_OUT,
    complete: function() {
      viewer.scene.requestRender();
      if (callback) callback();
    }
  });
}


// ---------------------------------------------------------------
// Timeline View
// ---------------------------------------------------------------
function renderTimeline() {
  const trip = state.currentTrip;
  if (!trip) return;

  const stops = (trip.stops || []).slice().sort((a, b) => a.stop_order - b.stop_order);
  const photos = trip.photos || [];

  if (stops.length === 0) {
    if (photos.length > 0) {
      timelineContent.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><h3>No stops yet</h3><p>Upload more photos or click "+ Add Stop" in the Details tab to organize your ' + photos.length + ' photo' + (photos.length > 1 ? 's' : '') + ' into a timeline.</p></div>';
    } else {
      timelineContent.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><h3>No story yet</h3><p>Upload photos to automatically build your travel timeline!</p></div>';
    }
    return;
  }

  let html = '<div class="timeline">';
  stops.forEach(stop => {
    const stopPhotos = photos.filter(p => p.stop_id === stop.id);
    // Also include photos near this stop (within ~500m)
    const nearbyPhotos = photos.filter(p => {
      if (p.stop_id) return false;
      if (p.lat == null || p.lng == null) return false;
      const dx = (p.lng - stop.lng) * Math.cos(stop.lat * Math.PI / 180) * 111320;
      const dy = (p.lat - stop.lat) * 111320;
      return Math.sqrt(dx * dx + dy * dy) < 500;
    });
    const allPhotos = stopPhotos.concat(nearbyPhotos).sort((a, b) => {
      const ta = a.taken_at || a.created_at || '';
      const tb = b.taken_at || b.created_at || '';
      return ta < tb ? -1 : ta > tb ? 1 : 0;
    });

    html += '<div class="timeline-card" data-lat="' + stop.lat + '" data-lng="' + stop.lng + '" data-stop-id="' + escapeHtml(stop.id) + '">';
    if (stop.arrived_at) {
      html += '<div class="tc-date">' + formatDate(stop.arrived_at) + '</div>';
    }
    html += '<h3>' + escapeHtml(stop.title || 'Untitled Stop') + '</h3>';
    if (stop.location_name) {
      html += '<div class="tc-location">📍 ' + escapeHtml(stop.location_name) + '</div>';
    }
    if (stop.description) {
      html += '<div class="tc-desc">' + escapeHtml(stop.description) + '</div>';
    }
    html += '<div class="tc-count">' + allPhotos.length + ' photo' + (allPhotos.length !== 1 ? 's' : '') + '<span class="tc-toggle">▼</span></div>';
    if (allPhotos.length > 0) {
      html += '<div class="timeline-photos" style="margin-top:8px">';
      allPhotos.forEach(p => {
        html += '<img src="/thumb/' + escapeHtml(p.filename) + '" alt="' + escapeHtml(p.caption || '') + '" loading="lazy" data-photo-id="' + escapeHtml(p.id) + '">';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  timelineContent.innerHTML = html;

  // Click card: toggle collapse, or fly to location
  $$('.timeline-card').forEach(card => {
    // Toggle collapse when clicking the count/toggle area
    const toggle = card.querySelector('.tc-toggle');
    const countEl = card.querySelector('.tc-count');
    if (countEl) {
      countEl.addEventListener('click', (e) => {
        e.stopPropagation();
        card.classList.toggle('collapsed');
      });
    }

    // Click card body (not photos, not toggle) to fly
    card.addEventListener('click', (e) => {
      if (e.target.tagName === 'IMG' && e.target.dataset.photoId) return;
      if (e.target.closest('.tc-count')) return;
      const sid = card.dataset.stopId;
      const trip = state.currentTrip;
      const stop = trip && sid ? (trip.stops || []).find(s => s.id === sid) : null;
      if (stop) {
        flyToStop(stop);
      } else {
        // Fallback if stop not found
        const lat = parseFloat(card.dataset.lat);
        const lng = parseFloat(card.dataset.lng);
        if (!isNaN(lat) && !isNaN(lng)) {
          const camHeight = 12000;
          const latOff = camHeight / 111320;
          const dest = Cesium.Cartesian3.fromDegrees(lng, lat - latOff, camHeight);
          const d = Math.max(0.8, Math.min(3.0, Cesium.Cartesian3.distance(viewer.camera.positionWC, dest) / 5000));
          viewer.camera.flyTo({
            destination: dest,
            orientation: { heading: 0, pitch: Cesium.Math.toRadians(-45), roll: 0 },
            duration: d,
            easingFunction: Cesium.EasingFunction.QUADRATIC_IN_OUT,
          });
        }
      }
    });
  });

  // Click timeline photo to open modal
  $$('.timeline-photos img[data-photo-id]').forEach(img => {
    img.style.cursor = 'pointer';
    img.addEventListener('click', (e) => {
      e.stopPropagation();
      openPhotoModal(img.dataset.photoId);
    });
  });
}

// ---------------------------------------------------------------
// Presentation Mode
// ---------------------------------------------------------------
const presOverlay = $('#presentationOverlay');
const presContent = $('#presContent');
const presTitle = $('#presTitle');
const presCounter = $('#presCounter');
const presCaption = $('#presCaption');
const presBottom = $('#presBottom');
const presPrev = $('#presPrev');
const presNext = $('#presNext');
const presMiniGlobeWrap = $('#presMiniGlobeWrap');
const presMiniGlobeEl = $('#presMiniGlobeEl');
const presMiniLabel = $('#presMiniLabel');
const presCommentsPanel = $('#presCommentsPanel');
const presCommentsList = $('#presCommentsList');
const presCommentInput = $('#presCommentInput');

let presSlides = [];
let presIndex = 0;
let presGlobeViewer = null;
let presMiniGlobeViewer = null;
let presMiniSpinRAF = null;
let presActive = false;
const presImageCache = new Map();

function buildPresentationSlides() {
  const trip = state.currentTrip;
  if (!trip) return [];
  const stops = (trip.stops || []).slice().sort((a, b) => a.stop_order - b.stop_order);
  const photos = (trip.photos || []).slice();
  const slides = [];

  stops.forEach((stop, si) => {
    const stopPhotos = photos.filter(p => p.stop_id === stop.id);
    const nearbyPhotos = photos.filter(p => {
      if (p.stop_id) return false;
      if (p.lat == null || p.lng == null) return false;
      const dx = (p.lng - stop.lng) * Math.cos(stop.lat * Math.PI / 180) * 111320;
      const dy = (p.lat - stop.lat) * 111320;
      return Math.sqrt(dx * dx + dy * dy) < 500;
    });
    const allPhotos = stopPhotos.concat(nearbyPhotos).sort((a, b) => {
      const ta = a.taken_at || a.created_at || '';
      const tb = b.taken_at || b.created_at || '';
      return ta < tb ? -1 : ta > tb ? 1 : 0;
    });

    if (allPhotos.length === 0) return;

    slides.push({
      type: 'globe',
      stop: stop,
      stopTitle: stop.title || ('Stop ' + (si + 1)),
      location: stop.location_name || '',
      date: stop.arrived_at ? formatPresDate(stop.arrived_at) : '',
    });

    allPhotos.forEach(p => {
      slides.push({
        type: 'photo',
        photo: p,
        stop: stop,
        stopTitle: stop.title || ('Stop ' + (si + 1)),
        location: stop.location_name || '',
        caption: p.caption || '',
        date: p.taken_at ? formatPresDateTime(p.taken_at) : '',
      });
    });
  });

  return slides;
}

function formatPresDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function formatPresDateTime(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })
    + ' \u2022 ' + dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function startPresentation() {
  const slides = buildPresentationSlides();
  if (slides.length === 0) {
    toast('No photos to present', 'error');
    return;
  }
  presSlides = slides;
  presIndex = 0;
  presActive = true;
  presTitle.textContent = state.currentTrip.title || 'Presentation';
  presOverlay.classList.add('active');

  // Request fullscreen
  const el = presOverlay;
  if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

  // Show controls briefly
  presOverlay.classList.add('show-controls');
  setTimeout(() => presOverlay.classList.remove('show-controls'), 2000);

  // Initialize the persistent mini globe
  initPresMiniGlobe();

  showPresSlide(0);
}

function stopPresentation() {
  presActive = false;
  presOverlay.classList.remove('active');
  presContent.innerHTML = '';

  if (presGlobeViewer) {
    try { presGlobeViewer.destroy(); } catch(e) {}
    presGlobeViewer = null;
  }

  destroyPresMiniGlobe();
  presImageCache.clear();
  presCommentsPanel.style.display = 'none';

  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen || (() => {})).call(document);
  }

  // In present-only mode, redirect doesn't make sense; just close overlay
}

function presCacheAhead(fromIdx) {
  let cached = 0;
  for (let i = fromIdx + 1; i < presSlides.length && cached < 2; i++) {
    const s = presSlides[i];
    if (s.type === 'photo' && s.photo && !presImageCache.has(s.photo.filename)) {
      const img = new Image();
      img.src = '/uploads/' + s.photo.filename;
      presImageCache.set(s.photo.filename, img);
      cached++;
    }
  }
}

function showPresSlide(idx) {
  if (idx < 0 || idx >= presSlides.length) return;
  presIndex = idx;
  const slide = presSlides[idx];

  presCounter.textContent = (idx + 1) + ' / ' + presSlides.length;
  presPrev.disabled = idx === 0;
  presNext.disabled = idx === presSlides.length - 1;

  if (slide.type === 'globe') {
    showPresGlobe(slide);
  } else {
    showPresPhoto(slide);
  }

  // Update mini globe for any slide that has a location
  const loc = getSlideLocation(slide);
  const locName = slide.location || slide.stopTitle || '';
  updatePresMiniGlobe(loc, locName);

  presCacheAhead(idx);
}

function showPresPhoto(slide) {
  if (presGlobeViewer) {
    try { presGlobeViewer.destroy(); } catch(e) {}
    presGlobeViewer = null;
  }

  presContent.innerHTML = '';
  const container = document.createElement('div');
  container.className = 'pres-photo-slide active';

  const img = document.createElement('img');
  const cached = presImageCache.get(slide.photo.filename);
  if (cached && cached.complete && cached.naturalWidth > 0) {
    img.src = cached.src;
  } else {
    img.src = '/uploads/' + slide.photo.filename;
  }
  img.alt = slide.caption || '';
  img.draggable = false;
  container.appendChild(img);
  presContent.appendChild(container);

  // Caption
  let capHtml = '';
  if (slide.caption) capHtml += '<div class="pres-cap-text">' + escapeHtml(slide.caption) + '</div>';
  if (slide.date) capHtml += '<div class="pres-cap-date">' + escapeHtml(slide.date) + '</div>';
  capHtml += '<div class="pres-cap-stop">' + escapeHtml(slide.stopTitle);
  if (slide.location) capHtml += ' \u2022 ' + escapeHtml(slide.location);
  capHtml += '</div>';
  presCaption.innerHTML = capHtml;
  presBottom.style.display = '';

  // Show comments for this photo
  renderPresComments(slide.photo.id);
}

function getSlideLocation(slide) {
  if (slide.photo && slide.photo.lat != null && slide.photo.lng != null) {
    return { lat: slide.photo.lat, lng: slide.photo.lng };
  }
  if (slide.stop && slide.stop.lat != null && slide.stop.lng != null) {
    return { lat: slide.stop.lat, lng: slide.stop.lng };
  }
  return null;
}

// ---- Persistent mini globe ----
function initPresMiniGlobe() {
  destroyPresMiniGlobe();
  presMiniGlobeWrap.classList.remove('hidden');

  Cesium.Ion.defaultAccessToken = '';
  presMiniGlobeViewer = new Cesium.Viewer(presMiniGlobeEl, {
    baseLayer: false,
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    sceneModePicker: false,
    selectionIndicator: false,
    navigationHelpButton: false,
    animation: false,
    timeline: false,
    fullscreenButton: false,
    vrButton: false,
    infoBox: false,
    creditContainer: document.createElement('div'),
    skyAtmosphere: new Cesium.SkyAtmosphere(),
    requestRenderMode: false,
    scene3DOnly: true,
  });

  Cesium.ArcGisMapServerImageryProvider.fromUrl(
    'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
  ).then(function(provider) {
    if (presMiniGlobeViewer) presMiniGlobeViewer.imageryLayers.addImageryProvider(provider);
  }).catch(function() {});

  const ctrl = presMiniGlobeViewer.scene.screenSpaceCameraController;
  ctrl.enableRotate = false;
  ctrl.enableZoom = false;
  ctrl.enableTranslate = false;
  ctrl.enableTilt = false;
  ctrl.enableLook = false;

  presMiniGlobeViewer.scene.postProcessStages.fxaa.enabled = false;
  presMiniGlobeViewer.scene.globe.enableLighting = false;

  // Set initial view — will be positioned by first updatePresMiniGlobe call
  presMiniGlobeViewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(0, 20, 20000000),
    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
  });
}

function destroyPresMiniGlobe() {
  stopMiniGlobeSpin();
  miniGlobeLastTargetKey = null;
  if (presMiniGlobeViewer) {
    try { presMiniGlobeViewer.destroy(); } catch(e) {}
    presMiniGlobeViewer = null;
  }
  presMiniGlobeEl.innerHTML = '';
  presMiniGlobeWrap.classList.add('hidden');
  presMiniLabel.textContent = '';
}

let miniGlobeLastTargetKey = null; // track last target to avoid re-spinning to same spot

function spinMiniGlobeTo(targetLng, targetLat) {
  stopMiniGlobeSpin();

  if (!presMiniGlobeViewer || presMiniGlobeViewer.isDestroyed()) return;

  // Don't re-spin if already at this target
  const key = targetLng.toFixed(2) + ',' + targetLat.toFixed(2);
  if (miniGlobeLastTargetKey === key) return;
  miniGlobeLastTargetKey = key;

  // Get current camera longitude from the cartographic position
  const cam = presMiniGlobeViewer.camera;
  const carto = cam.positionCartographic;
  const currentLng = Cesium.Math.toDegrees(carto.longitude);
  const currentAlt = carto.height;

  // Compute shortest angular delta in longitude (-180..180)
  let deltaLng = targetLng - currentLng;
  while (deltaLng > 180) deltaLng -= 360;
  while (deltaLng < -180) deltaLng += 360;

  // Also need to move in latitude
  const currentLat = Cesium.Math.toDegrees(carto.latitude);
  const deltaLat = targetLat - currentLat;

  const totalFrames = Math.max(90, Math.round(Math.abs(deltaLng) * 1.2)); // ~1.5-3s depending on distance
  let frame = 0;

  // Altitude: start at current, settle to 3,000,000m at end
  const startAlt = currentAlt;
  const endAlt = 3000000;

  function step() {
    if (!presMiniGlobeViewer || presMiniGlobeViewer.isDestroyed()) return;
    frame++;

    // Ease-in-out (smooth stop, no overshoot)
    const t = frame / totalFrames;
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

    const lng = currentLng + deltaLng * ease;
    const lat = currentLat + deltaLat * ease;
    const alt = startAlt + (endAlt - startAlt) * ease;

    presMiniGlobeViewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(lng, lat, alt),
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
    });

    if (frame >= totalFrames) {
      presMiniSpinRAF = null;
      // Ensure final position is exact
      presMiniGlobeViewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(targetLng, targetLat, endAlt),
        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
      });
      return;
    }

    presMiniSpinRAF = requestAnimationFrame(step);
  }
  presMiniSpinRAF = requestAnimationFrame(step);
}

function stopMiniGlobeSpin() {
  if (presMiniSpinRAF) {
    cancelAnimationFrame(presMiniSpinRAF);
    presMiniSpinRAF = null;
  }
}

function updatePresMiniGlobe(loc, label) {
  if (!presMiniGlobeViewer || presMiniGlobeViewer.isDestroyed()) return;

  presMiniLabel.textContent = label || '';
  presMiniGlobeViewer.entities.removeAll();

  if (loc) {
    presMiniGlobeViewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(loc.lng, loc.lat),
      point: {
        pixelSize: 8,
        color: Cesium.Color.fromCssColorString('#f59e0b'),
        outlineColor: Cesium.Color.WHITE,
        outlineWidth: 2,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
      },
    });

    // Smoothly rotate to the marker location (shortest path, no overshoot)
    spinMiniGlobeTo(loc.lng, loc.lat);
  }
}

// ---- Comments ----
function getPresComments(photoId) {
  const trip = state.currentTrip;
  if (!trip || !trip.comments) return [];
  return trip.comments.filter(c => c.photo_id === photoId).sort((a, b) => {
    return (a.created_at || '') < (b.created_at || '') ? -1 : 1;
  });
}

function renderPresComments(photoId) {
  if (!photoId) {
    presCommentsPanel.style.display = 'none';
    return;
  }
  presCommentsPanel.style.display = 'flex';
  presCommentsPanel.dataset.photoId = photoId;

  const comments = getPresComments(photoId);
  if (comments.length === 0) {
    presCommentsList.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:12px;text-align:center;padding:8px">No comments yet</div>';
  } else {
    presCommentsList.innerHTML = comments.map(c => {
      const when = c.created_at ? formatPresCommentTime(c.created_at) : '';
      return '<div class="pres-comment">'
        + '<div class="pres-comment-author">' + escapeHtml(c.author) + '</div>'
        + '<div class="pres-comment-body">' + escapeHtml(c.body) + '</div>'
        + (when ? '<div class="pres-comment-time">' + when + '</div>' : '')
        + '</div>';
    }).join('');
    presCommentsList.scrollTop = presCommentsList.scrollHeight;
  }
}

function formatPresCommentTime(d) {
  const dt = new Date(d);
  const now = new Date();
  const diffMs = now - dt;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return diffMin + 'm ago';
  const diffH = Math.floor(diffMin / 60);
  if (diffH < 24) return diffH + 'h ago';
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

async function submitPresComment() {
  const body = presCommentInput.value.trim();
  if (!body) return;
  const photoId = presCommentsPanel.dataset.photoId;
  if (!photoId) return;

  const trip = state.currentTrip;
  if (!trip) return;

  try {
    let comment;
    if (state.presentSlug) {
      comment = await api('POST', '/api/present/' + state.presentSlug + '/photos/' + photoId + '/comments', { body: body, author: '' });
    } else if (state.shareID) {
      comment = await api('POST', '/api/share/' + state.shareID + '/photos/' + photoId + '/comments', { body: body, author: '' });
    } else {
      comment = await api('POST', '/api/photos/' + photoId + '/comments', { body: body, author: '' });
    }
    // Add to local state
    if (!trip.comments) trip.comments = [];
    trip.comments.push(comment);
    presCommentInput.value = '';
    renderPresComments(photoId);
  } catch (err) {
    toast('Failed to post comment', 'error');
  }
}

$('#presCommentSend').addEventListener('click', submitPresComment);
presCommentInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); submitPresComment(); }
  e.stopPropagation(); // Don't let arrow keys etc. bubble to slide nav
});
presCommentInput.addEventListener('keyup', (e) => e.stopPropagation());

function showPresGlobe(slide) {
  presContent.innerHTML = '';
  const container = document.createElement('div');
  container.className = 'pres-globe-slide active';

  const globeDiv = document.createElement('div');
  globeDiv.className = 'pres-globe-canvas';
  globeDiv.id = 'presGlobeContainer';
  container.appendChild(globeDiv);

  const label = document.createElement('div');
  label.className = 'pres-globe-label';
  label.innerHTML = escapeHtml(slide.stopTitle)
    + (slide.location ? '<div class="pres-globe-sublabel">' + escapeHtml(slide.location) + '</div>' : '')
    + (slide.date ? '<div class="pres-globe-sublabel">' + escapeHtml(slide.date) + '</div>' : '');
  container.appendChild(label);

  presContent.appendChild(container);

  presCaption.innerHTML = '';
  presBottom.style.display = '';
  presCommentsPanel.style.display = 'none';

  initPresGlobe(globeDiv, slide.stop);
}

function initPresGlobe(containerEl, stop) {
  if (presGlobeViewer) {
    try { presGlobeViewer.destroy(); } catch(e) {}
    presGlobeViewer = null;
  }

  Cesium.Ion.defaultAccessToken = '';
  presGlobeViewer = new Cesium.Viewer(containerEl, {
    baseLayer: false,
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    sceneModePicker: false,
    selectionIndicator: false,
    navigationHelpButton: false,
    animation: false,
    timeline: false,
    fullscreenButton: false,
    vrButton: false,
    infoBox: false,
    creditContainer: document.createElement('div'),
    skyAtmosphere: new Cesium.SkyAtmosphere(),
    requestRenderMode: false,
    scene3DOnly: true,
  });

  Cesium.ArcGisMapServerImageryProvider.fromUrl(
    'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
  ).then(function(provider) {
    if (presGlobeViewer && !presGlobeViewer.isDestroyed()) presGlobeViewer.imageryLayers.addImageryProvider(provider);
  }).catch(function() {
    if (presGlobeViewer && !presGlobeViewer.isDestroyed()) presGlobeViewer.imageryLayers.addImageryProvider(
      new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org/' })
    );
  });

  presGlobeViewer.scene.postProcessStages.fxaa.enabled = false;
  presGlobeViewer.scene.globe.enableLighting = false;
  presGlobeViewer.scene.globe.depthTestAgainstTerrain = false;

  const ctrl = presGlobeViewer.scene.screenSpaceCameraController;
  ctrl.enableRotate = false;
  ctrl.enableZoom = false;
  ctrl.enableTranslate = false;
  ctrl.enableTilt = false;
  ctrl.enableLook = false;

  presGlobeViewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(stop.lng, stop.lat),
    billboard: {
      image: buildStopIcon(stop.stop_order + 1),
      verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
      scale: 1.0,
      disableDepthTestDistance: 100000,
    },
  });

  let dest, heading, pitch;
  if (stop.cam_lng != null && stop.cam_lat != null && stop.cam_height != null) {
    dest = Cesium.Cartesian3.fromDegrees(stop.cam_lng, stop.cam_lat, stop.cam_height);
    heading = stop.cam_heading != null ? stop.cam_heading : 0;
    pitch = stop.cam_pitch != null ? stop.cam_pitch : Cesium.Math.toRadians(-45);
  } else {
    const camHeight = 12000;
    const latOffset = camHeight / 111320;
    dest = Cesium.Cartesian3.fromDegrees(stop.lng, stop.lat - latOffset, camHeight);
    heading = 0;
    pitch = Cesium.Math.toRadians(-45);
  }

  presGlobeViewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(stop.lng, stop.lat, 8000000),
    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
  });

  presGlobeViewer.camera.flyTo({
    destination: dest,
    orientation: { heading: heading, pitch: pitch, roll: 0 },
    duration: 3.0,
    easingFunction: Cesium.EasingFunction.QUADRATIC_IN_OUT,
  });
}

function buildStopIcon(num) {
  const c = document.createElement('canvas');
  c.width = 48; c.height = 48;
  const ctx = c.getContext('2d');
  ctx.beginPath();
  ctx.arc(24, 24, 18, 0, Math.PI * 2);
  ctx.fillStyle = '#f59e0b';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(num), 24, 25);
  return c.toDataURL();
}

// Event handlers
$('#presExit').addEventListener('click', stopPresentation);
$('#presPrev').addEventListener('click', () => showPresSlide(presIndex - 1));
$('#presNext').addEventListener('click', () => showPresSlide(presIndex + 1));

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (!presActive) return;
  if (e.key === 'Escape') { stopPresentation(); e.preventDefault(); }
  else if (e.key === 'ArrowRight' || e.key === ' ') { showPresSlide(presIndex + 1); e.preventDefault(); }
  else if (e.key === 'ArrowLeft') { showPresSlide(presIndex - 1); e.preventDefault(); }
});

// When exiting fullscreen, just keep presentation running (non-fullscreen is fine)

// ---------------------------------------------------------------
// Init
// ---------------------------------------------------------------
initMap();

})();
</script>
